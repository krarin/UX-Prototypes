<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalQA Doc Center V2 – Updated Table</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Roboto', 'sans-serif'] },
          colors: {
            primary: { 100: '#E6F5F3', 500: '#009688', 600: '#00877A', 700: '#00695c' },
            neutral: {
              50:  '#FAFAFA', 100: '#F5F5F5', 200: '#EEEEEE', 300: '#E0E0E0',
              400: '#BDBDBD', 500: '#9E9E9E', 600: '#757575', 700: '#616161',
              800: '#424242', 900: '#212121',
            },
            /* QA status — from Figma UI-Kit tokens */
            'qa-pass':           '#20BF6B',
            'qa-pass-light':     '#E9FCF2',
            'qa-warn':           '#FF9F1A',
            'qa-warn-light':     '#FFF5E8',
            'qa-fail':           '#FF5656',
            'qa-fail-light':     '#FFEEEE',
            'qa-ignored':        '#4B7BEC',
            'qa-ignored-light':  '#EBF0FB',
            'qa-pending':        '#78909C',
            'qa-pending-light':  '#ECEFF1',
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'Roboto', sans-serif; }
    .icon {
      font-family: 'Material Symbols Outlined'; font-style: normal;
      font-size: 20px; line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      user-select: none;
    }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

  /* ── Data ── */
  const GROUPS = [
    {
      id: 'unkategorisiert',
      label: 'Unkategorisiert',
      icon: 'folder_open',
      items: [
        { id: 101, name: 'Unkategorisierte Seiten', docStatus: 'pending' },
      ]
    },
    {
      id: 'persoenlich',
      label: 'Persönliche Dokumente',
      icon: 'person',
      newCount: 2,
      items: [
        { id: 201, name: 'Gehaltsabrechnung Juli',    docStatus: 'pending', isNew: true,
          warnings: ['IBAN fehlt auf der Gehaltsabrechnung'] },
        { id: 202, name: 'Gehaltsabrechnung September', docStatus: 'ok' },
        { id: 204, name: 'Gehaltsabrechnung August',       docStatus: 'pending' },
        { id: 205, name: 'Beidseitige Ausweiskopie (gültiger EU-Personalausweis oder Reisepass)', docStatus: 'pending',
          warnings: ['Nur Reisepass hochgeladen – Meldebescheinigung erforderlich'],
          note: 'Wir haben Ihren Reisepass erhalten. Um Ihren Antrag weiterzubearbeiten, benötigen wir zusätzlich eine aktuelle Meldebescheinigung.' },
        { id: 206, name: 'Aufenthaltstitel', docStatus: 'pending',
          warnings: ['Aufenthaltstitel läuft in weniger als 6 Monaten ab'] },
      ]
    },
    {
      id: 'immobilien',
      label: 'Immobilienunterlagen',
      icon: 'home',
      items: [
        { id: 301, name: 'Vollständiger aktueller Grundbuchauszug (max. 3 Monate alt)', docStatus: 'ok' },
        { id: 302, name: 'Wohnflächenberechnung (mit Angabe von Länge und Breite je Raum)', docStatus: 'ok',
          warnings: ['Maße bei Raum 3 fehlen', 'Stempel des Architekten fehlt'] },
        { id: 303, name: 'Aktuelle Flurkarte/Lageplan',  docStatus: 'ok' },
        { id: 304, name: 'Baubeschreibung',              docStatus: 'pending' },
        { id: 305, name: 'Kaufvertragsentwurf',          docStatus: 'ok' },
        { id: 306, name: 'Bemaßte Baupläne (evtl. fehlende Maßangaben bitte zwingend ergänzen)', docStatus: 'ok' },
        { id: 307, name: 'Exposé',                       docStatus: 'rejected',
          rejectedReasons: ['Dokument unleserlich – bitte erneut scannen', 'Exposé veraltet (älter als 3 Monate)'] },
        { id: 308, name: 'Aktuelle Objektfotos in Farbe von Innen und Außen (je mind. 2)', docStatus: 'ok' },
        { id: 309, name: 'Energieausweis', docStatus: 'rejected',
          rejectedReasons: ['Gültigkeitsdatum abgelaufen – automatisch abgelehnt'] },
      ]
    }
  ];

  /* all items flattened for viewer lookup */
  const ALL_DOCS = GROUPS.flatMap(g => g.items);

  /* ── Sub-components ── */

  /* Orange triangle warning icon with "?" — matches Figma node 29:80326 */
  function WarnIcon({ size = 16, className = '', color = '#FF9F1A' }) {
    const textColor = color === '#FF9F1A' ? 'white' : '#FF9F1A';
    return (
      <svg width={size} height={size} viewBox="0 0 20 20" fill="none" className={className} style={{ flexShrink: 0, display: 'inline-block' }}>
        <path d="M9.13 3.2L1.2 16.8A1 1 0 0 0 2.07 18.3H17.93A1 1 0 0 0 18.8 16.8L10.87 3.2A1 1 0 0 0 9.13 3.2Z" fill={color}/>
        <text x="10" y="15.5" textAnchor="middle" fill={textColor} fontSize="8" fontWeight="700" fontFamily="Roboto, sans-serif">!</text>
      </svg>
    );
  }

  /* ── Tooltip (portal, bypasses overflow clipping) ── */
  function Tooltip({ anchor, children }) {
    if (!anchor) return null;
    const TIP_W = 248;
    const GAP   = 6;
    const PAD   = 8;

    // Center on anchor, then clamp so neither edge leaves the viewport
    const rawLeft = anchor.left + anchor.width / 2 - TIP_W / 2;
    const left = Math.max(PAD, Math.min(rawLeft, window.innerWidth - TIP_W - PAD));

    // Prefer above; fall back to below when near the top of the screen
    const above = anchor.top > 180;
    const vertical = above
      ? { bottom: window.innerHeight - anchor.top + GAP }
      : { top: anchor.bottom + GAP };

    const style = {
      position: 'fixed',
      zIndex: 9999,
      left,
      width: TIP_W,
      ...vertical,
      pointerEvents: 'none',
    };
    return ReactDOM.createPortal(
      <div style={style} className="bg-white border border-neutral-200 rounded-lg shadow-lg overflow-hidden text-left">
        {children}
      </div>,
      document.body
    );
  }

  /* ── DocStatusBadge — left of document name ── */
  function DocStatusBadge({ docStatus, rejectedReasons = [] }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);

    function StatusIcon() {
      if (docStatus === 'ok')
        return <span className="icon icon-filled text-[18px] text-green-500 leading-none">check_circle</span>;
      if (docStatus === 'rejected')
        return <span className="icon icon-filled text-[18px] text-red-500 leading-none">cancel</span>;
      /* pending — filled circle with white hourglass */
      return (
        <span className="w-[18px] h-[18px] rounded-full bg-neutral-400 inline-flex items-center justify-center flex-shrink-0 overflow-hidden">
          <span className="icon text-[11px] text-white" style={{ fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20", lineHeight: 1, display: 'block' }}>hourglass_empty</span>
        </span>
      );
    }

    const labels = { ok: 'Genehmigt', pending: 'Ausstehend', rejected: 'Abgelehnt' };

    return (
      <div
        ref={ref}
        className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}
      >
        <StatusIcon />
        <Tooltip anchor={anchor}>
          {docStatus === 'rejected' ? (
            <>
              <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-1.5 bg-red-50">
                <span className="icon icon-filled text-[14px] text-red-500">cancel</span>
                <span className="text-[11px] font-medium text-red-600 uppercase tracking-wide">Abgelehnt</span>
              </div>
              {rejectedReasons.length > 0 && (
                <ul className="px-3 py-2.5 flex flex-col gap-1.5">
                  {rejectedReasons.map((r, i) => (
                    <li key={i} className="flex items-start gap-2 text-[12px] text-neutral-700 leading-snug">
                      <span className="mt-[5px] w-1.5 h-1.5 rounded-full bg-red-400 flex-shrink-0" />
                      {r}
                    </li>
                  ))}
                </ul>
              )}
            </>
          ) : (
            <div className="px-3 py-2.5 flex items-center gap-2">
              <StatusIcon />
              <span className="text-[12px] text-neutral-700 font-medium">{labels[docStatus] || 'Ausstehend'}</span>
            </div>
          )}
        </Tooltip>
      </div>
    );
  }

  /* ── WarningBadge — right side exclamation ── */
  function WarningBadge({ warnings }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    if (!warnings || warnings.length === 0) return null;
    return (
      <div
        ref={ref}
        className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}
      >
        <WarnIcon size={18} />
        <Tooltip anchor={anchor}>
          <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-1.5 bg-amber-50">
            <WarnIcon size={14} />
            <span className="text-[11px] font-medium text-amber-600 uppercase tracking-wide">
              {warnings.length} {warnings.length === 1 ? 'Hinweis' : 'Hinweise'}
            </span>
          </div>
          <ul className="px-3 py-2.5 flex flex-col gap-1.5">
            {warnings.map((w, i) => (
              <li key={i} className="flex items-start gap-2 text-[12px] text-neutral-700 leading-snug">
                <span className="mt-[5px] w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0" />
                {w}
              </li>
            ))}
          </ul>
        </Tooltip>
      </div>
    );
  }

  /* Blue description icon for sidebar — shown after doc is approved with an ignored note */
  function SidebarIgnoreNoteIcon({ override }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    const ts = override?.timestamp ? new Date(override.timestamp) : null;
    const dateStr = ts
      ? ts.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
        + ' · ' + ts.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
      : '';
    return (
      <div ref={ref} className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}>
        <span className="icon icon-filled text-[18px] text-qa-ignored" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>description</span>
        <Tooltip anchor={anchor}>
          <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-2 bg-neutral-50">
            <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-neutral-500 text-white text-[10px] font-bold flex-shrink-0">
              {override?.initials ?? '??'}
            </span>
            <div className="flex flex-col leading-tight">
              <span className="text-[11px] font-medium text-neutral-700">{override?.advisorName ?? '–'}</span>
              <span className="text-[10px] text-neutral-400">{dateStr}</span>
            </div>
          </div>
          <div className="px-3 py-2">
            <p className="text-[12px] text-neutral-700 leading-snug">{override?.note}</p>
          </div>
        </Tooltip>
      </div>
    );
  }

  function NewBadge() {
    return (
      <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">
        Neu
      </span>
    );
  }

  function Checkbox({ checked, onChange }) {
    return (
      <input
        type="checkbox"
        checked={checked}
        onChange={onChange}
        onClick={e => e.stopPropagation()}
        className="w-4 h-4 rounded-md border-neutral-300 accent-[#78909C] flex-shrink-0 cursor-pointer"
      />
    );
  }

  function CategoryGroup({ group, selectedId, onSelect, checkedIds, onCheck, supportingSlots = {}, docStatusOverrides = {}, ignoredNotesByDoc = {} }) {
    const [open, setOpen] = React.useState(false);
    const approvedCount = group.items.filter(i => (docStatusOverrides[i.id] ?? i.docStatus) === 'ok').length;
    const totalCount = group.items.length;

    function handleHeaderClick() {
      const opening = !open;
      setOpen(opening);
      if (opening && group.items.length > 0) {
        onSelect(group.items[0].id);
      }
    }

    return (
      <div className="bg-white rounded-lg border border-neutral-200">
        {/* Category header */}
        <div
          className="flex items-center gap-2 px-4 cursor-pointer bg-white hover:bg-neutral-50 select-none h-11"
          onClick={handleHeaderClick}
        >
          <Checkbox
            checked={group.items.every(i => checkedIds.has(i.id))}
            onChange={e => {
              e.stopPropagation();
              onCheck(group.items.map(i => i.id), e.target.checked);
            }}
          />
          <span className="icon icon-filled text-[18px] text-neutral-700">{group.icon}</span>
          <span className="flex-1 text-sm font-medium text-neutral-900 leading-snug">
            {group.label}
          </span>
          {group.newCount > 0 && (
            <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">
              {group.newCount} Neue
            </span>
          )}
          <span className="text-[12px] text-neutral-500 tabular-nums">{approvedCount}/{totalCount}</span>
          <button
            className="w-5 h-5 flex items-center justify-center text-neutral-800 hover:text-primary-500 transition-colors"
            onClick={e => { e.stopPropagation(); }}
            title="Hinzufügen"
          >
            <span className="icon text-[16px]">add</span>
          </button>
          <span className="icon text-[16px] text-neutral-800">
            {open ? 'expand_less' : 'expand_more'}
          </span>
        </div>

        {/* Items */}
        {open && (
          <ul>
            {group.items.map(item => {
              const active = item.id === selectedId;
              const slots  = supportingSlots[item.id] || [];
              const effectiveStatus = docStatusOverrides[item.id] ?? item.docStatus;
              const ignoredNote = ignoredNotesByDoc[item.id] ?? null;
              const isApprovedWithNote = effectiveStatus === 'ok' && ignoredNote;
              return (
                <React.Fragment key={item.id}>
                  <li className="border-t border-neutral-100 first:border-t-0">
                    <button
                      onClick={() => onSelect(item.id)}
                      className={`w-full text-left flex items-center gap-2 pr-3 py-2 transition-colors
                        ${active
                          ? 'bg-primary-100 border-l-4 border-l-primary-500 pl-[38px]'
                          : 'pl-[42px] hover:bg-neutral-50'}`}
                    >
                      <Checkbox
                        checked={checkedIds.has(item.id)}
                        onChange={e => onCheck([item.id], e.target.checked)}
                      />
                      <DocStatusBadge docStatus={effectiveStatus} rejectedReasons={item.rejectedReasons || []} />
                      <span className={`flex-1 text-[13px] leading-snug text-left min-w-0
                        ${active ? 'text-primary-700 font-medium' : 'text-neutral-700'}`}>
                        {item.name}
                      </span>
                      {item.isNew && <NewBadge />}
                      {isApprovedWithNote
                        ? <SidebarIgnoreNoteIcon override={ignoredNote} />
                        : <WarningBadge warnings={item.warnings} />}
                    </button>
                  </li>
                  {/* Supporting slots — indented with dashed amber connector */}
                  {slots.map((slot, si) => {
                    const slotActive = slot.id === selectedId;
                    return (
                      <li key={slot.id} className="border-t border-neutral-100 relative">
                        {/* Vertical dashed line */}
                        <span className="absolute pointer-events-none"
                          style={{ left: 54, top: 0, bottom: si === slots.length - 1 ? '50%' : 0,
                            borderLeft: '2px dashed #FF9F1A' }} />
                        {/* Horizontal stub */}
                        <span className="absolute pointer-events-none"
                          style={{ left: 54, top: '50%', width: 14,
                            borderTop: '2px dashed #FF9F1A' }} />
                        <button
                          onClick={() => onSelect(slot.id)}
                          className={`w-full text-left flex items-center gap-2 pr-3 py-2 transition-colors
                            ${slotActive ? 'bg-qa-warn-light border-l-4 pl-[66px]' : 'pl-[70px] hover:bg-neutral-50'}`}
                          style={slotActive ? { borderLeftColor: '#FF9F1A' } : {}}
                        >
                          <span className="w-[16px] h-[16px] rounded-full bg-neutral-300 inline-flex items-center justify-center flex-shrink-0 overflow-hidden">
                            <span className="icon text-[10px] text-white" style={{ fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20", lineHeight:1, display:'block' }}>hourglass_empty</span>
                          </span>
                          <span className="flex-1 text-[12px] italic text-qa-warn leading-snug text-left min-w-0 truncate">
                            {slot.name}
                          </span>
                          <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-neutral-600 text-white whitespace-nowrap flex-shrink-0">
                            Angefordert
                          </span>
                        </button>
                      </li>
                    );
                  })}
                </React.Fragment>
              );
            })}
          </ul>
        )}
      </div>
    );
  }

  /* ── Sidebar ── */
  function Sidebar({ selectedId, onSelect, supportingSlots = {}, docStatusOverrides = {}, ignoredNotesByDoc = {} }) {
    const [activeTab, setActiveTab] = React.useState('antragsunterlagen');
    const [checkedIds, setCheckedIds] = React.useState(new Set());

    const allIds = ALL_DOCS.map(d => d.id);
    const allChecked = allIds.every(id => checkedIds.has(id));

    function handleCheck(ids, checked) {
      setCheckedIds(prev => {
        const next = new Set(prev);
        ids.forEach(id => checked ? next.add(id) : next.delete(id));
        return next;
      });
    }

    const TABS = [
      { id: 'antragsunterlagen', label: 'Antragsunterlagen' },
      { id: 'vertragsunterlagen', label: 'Vertragsunterlagen' },
    ];

    return (
      <aside className="w-[400px] flex-shrink-0 flex flex-col bg-white border-r border-neutral-200 overflow-hidden">

        {/* ── Tab bar ── */}
        <div className="flex items-center border-b border-neutral-200 px-2 pt-2 gap-1">
          {TABS.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`px-3 py-1.5 text-[12px] font-medium rounded-t transition-colors whitespace-nowrap
                ${activeTab === tab.id
                  ? 'border border-neutral-300 border-b-white bg-white text-neutral-900 -mb-px z-10 relative'
                  : 'text-neutral-500 hover:text-neutral-700'}`}
            >
              {tab.label}
            </button>
          ))}
          <button className="ml-auto mb-2 w-6 h-6 flex items-center justify-center text-neutral-400 hover:text-neutral-600">
            <span className="icon text-[16px]">chevron_right</span>
          </button>
        </div>

        {/* ── Source bar ── */}
        <div className="flex items-center justify-between px-3 py-2 border-b border-neutral-200">
          <button className="flex items-center gap-1.5 text-primary-600 hover:text-primary-700 transition-colors">
            <div className="w-5 h-5 rounded bg-primary-500 flex items-center justify-center flex-shrink-0">
              <span className="text-[10px] font-bold text-white leading-none">F</span>
            </div>
            <span className="text-[13px] font-medium">FinLink</span>
            <span className="icon text-[16px]">arrow_drop_down</span>
          </button>
          <div className="flex items-center gap-1.5">
            <button className="flex items-center gap-1 h-6 px-2 rounded-full bg-primary-500 text-white text-[11px] font-medium hover:bg-primary-600 transition-colors">
              <span className="icon text-[13px]">visibility</span>
              Sichtbar
            </button>
            <button className="w-6 h-6 flex items-center justify-center text-neutral-400 hover:text-neutral-600 rounded hover:bg-neutral-100">
              <span className="icon text-[18px]">more_horiz</span>
            </button>
          </div>
        </div>

        {/* ── Select all ── */}
        <div className="flex items-center gap-2 px-3 py-2 border-b border-neutral-200">
          <Checkbox
            checked={allChecked}
            onChange={e => handleCheck(allIds, e.target.checked)}
          />
          <span className="flex-1 text-[13px] text-neutral-600">Alle auswählen</span>
          <button className="w-5 h-5 flex items-center justify-center text-neutral-400 hover:text-neutral-600">
            <span className="icon text-[16px]">unfold_more</span>
          </button>
        </div>

        {/* ── Document groups ── */}
        <div className="flex-1 min-h-0 overflow-y-auto flex flex-col gap-3 p-3 bg-[#ECEFF1]">
          {GROUPS.map(group => (
            <CategoryGroup
              key={group.id}
              group={group}
              selectedId={selectedId}
              onSelect={onSelect}
              checkedIds={checkedIds}
              onCheck={handleCheck}
              supportingSlots={supportingSlots}
              docStatusOverrides={docStatusOverrides}
              ignoredNotesByDoc={ignoredNotesByDoc}
            />
          ))}
        </div>

        {/* ── Footer ── */}
        <div className="border-t border-neutral-200 px-3 py-2.5 flex flex-col gap-1">
          <button className="flex items-center gap-1 text-primary-600 hover:text-primary-700 text-[13px] font-medium transition-colors">
            <span className="icon text-[16px]">add</span>
            Weitere Dokumente anfordern
          </button>
          <p className="text-[10px] text-neutral-400 leading-tight">
            FE: main@c297573658 | BE: main@c297573658
          </p>
        </div>

      </aside>
    );
  }

  /* ══════════════════════════════════════════════════════
     QA DATA MODEL  (status: pass | warning | fail | ignored | pending)
  ══════════════════════════════════════════════════════ */
  const QA_CHECKS = {
    201: [
      { id:'201-1', name:'IBAN auf Dokument',       description:'IBAN muss im Dokument vorhanden sein',
        status:'fail',    result:'IBAN nicht gefunden',
        override:null, remediation:{ type:'request_document', documentType:'bank_statement', label:'Kontoauszug anfordern', slotName:'Kontoauszug', slotNote:'Auf der eingereichten Gehaltsabrechnung ist keine IBAN ersichtlich. Bitte einen aktuellen Kontoauszug hochladen, um die IBAN zu bestätigen.' } },
      { id:'201-2', name:'Name stimmt überein',     description:'Kundenname muss auf dem Dokument lesbar sein',

  /* Status badge — coloured pill using Figma UI-Kit status tokens */
  function StatusBadge({ status, hasNote = false }) {
    const cfg = {
      pass:    { bg:'bg-qa-pass',    icon:'check',             label:'Bestanden'           },
      fail:    { bg:'bg-qa-fail',    icon:'cancel',            label:'Nicht erfüllt'       },
      ignored: { bg:'bg-qa-ignored', icon:'do_not_disturb_on', label: hasNote ? 'Ignoriert mit Notiz' : 'Ignoriert' },
      pending: { bg:'bg-qa-pending', icon:'hourglass_empty',   label:'Ausstehend'          },
    }[status];
    if (status === 'warning') return (
      <span className="flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap bg-qa-warn w-full">
        <WarnIcon size={13} color="white" />
        Warnung
      </span>
    );
    if (status === 'requested') return (
      <span className="flex items-center px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap w-full bg-neutral-600">
        Angefordert
      </span>
    );
    if (!cfg) return null;
    return (
      <span className={`flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap w-full ${cfg.bg}`}>
        <span className="icon icon-filled text-[13px]" style={{ lineHeight:1 }}>{cfg.icon}</span>
        {cfg.label}
      </span>
    );
  }

  /* Gray pen icon with hover tooltip showing ignore note + advisor + timestamp */
  function IgnoreNoteIcon({ override, onReset }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    const hasNote = !!(override?.note);
    const ts = override?.timestamp ? new Date(override.timestamp) : null;
    const dateStr = ts
      ? ts.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
        + ' · ' + ts.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
      : '';
    return (
      <div className="flex items-center gap-2 flex-nowrap">
        <div ref={ref} className="relative cursor-default flex items-center"
          onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
          onMouseLeave={() => setAnchor(null)}>
          <span className={`icon icon-filled text-[18px] ${hasNote ? 'text-qa-ignored' : 'text-neutral-400'}`} style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>description</span>
          {hasNote ? (
            <Tooltip anchor={anchor}>
              <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-2 bg-neutral-50">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-neutral-500 text-white text-[10px] font-bold flex-shrink-0">
                  {override?.initials ?? '??'}
                </span>
                <div className="flex flex-col leading-tight">
                  <span className="text-[11px] font-medium text-neutral-700">{override?.advisorName ?? '–'}</span>
                  <span className="text-[10px] text-neutral-400">{dateStr}</span>
                </div>
              </div>
              <div className="px-3 py-2">
                <p className="text-[12px] text-neutral-700 leading-snug">{override?.note}</p>
              </div>
            </Tooltip>
          ) : (
            <Tooltip anchor={anchor}>
              <div className="px-3 py-2">
                <p className="text-[12px] text-neutral-500">Notiz hinzufügen</p>
              </div>
            </Tooltip>
          )}
        </div>
        <button onClick={onReset}
          className="inline-flex items-center gap-1 px-2 py-0.5 rounded-[4px] border border-[#b0bec5] text-[11px] font-medium text-[#4b5961] hover:bg-neutral-50 transition-colors whitespace-nowrap flex-shrink-0">
          <span className="icon text-[13px]" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20" }}>undo</span>
          Zurücksetzen
        </button>
      </div>
    );
  }

  /* Action cell — right column of check row */
  function ActionCell({ check, onRequestDoc, onIgnore, onReset }) {
    if (check.status === 'pass' || check.status === 'pending' || check.status === 'requested')
      return <span className="text-neutral-300 text-[13px]">—</span>;
    if (check.status === 'ignored')
      return <IgnoreNoteIcon override={check.override} onReset={onReset} />;
    /* warning or fail */
    return (
      <div className="flex items-center gap-1.5 flex-nowrap">
        {check.remediation?.type === 'request_document' && (
          <button onClick={onRequestDoc}
            className="inline-flex items-center gap-1 px-2 py-0.5 rounded-[4px] bg-primary-500 text-white text-[11px] font-medium hover:bg-primary-600 transition-colors whitespace-nowrap">
            <span className="icon text-[13px]" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20" }}>add_circle</span>
            {check.remediation.label}
          </button>
        )}
        <button onClick={onIgnore}
          className="inline-flex items-center gap-1 px-2 py-0.5 rounded border border-neutral-300 text-neutral-600 text-[11px] font-medium hover:bg-neutral-100 transition-colors whitespace-nowrap">
          <span className="icon text-[13px]" style={{ lineHeight:1 }}>do_not_disturb_on</span>
          Ignorieren
        </button>
      </div>
    );
  }

  /* Single check row */
  function QACheckRow({ check, onRequestDoc, onIgnore, onReset }) {
    const isPass = check.status === 'pass';
    const resultColor = { ignored:'text-neutral-400', pending:'text-neutral-400' }[check.status] || 'text-[#37474f]';
    return (
      <tr className="border-b border-neutral-100 last:border-0 hover:bg-neutral-50 transition-colors">
        <td className="px-3 py-1.5 align-middle whitespace-nowrap"><StatusBadge status={check.status} hasNote={!!(check.override?.note)} /></td>
        <td className="px-3 py-1.5 align-middle whitespace-nowrap">
          <span className="text-[12px] font-medium text-[#37474f]">{check.name}</span>
        </td>
        <td className="px-3 py-1.5 align-middle">
          {isPass
            ? <span className="icon icon-filled text-[15px] text-qa-pass" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 20" }}>check</span>
            : <span className={`text-[12px] ${resultColor}`}>{check.result}</span>
          }
        </td>
        <td className="px-3 py-1.5 align-middle whitespace-nowrap">
          <ActionCell check={check} onRequestDoc={onRequestDoc} onIgnore={onIgnore} onReset={onReset} />
        </td>
      </tr>
    );
  }

  /* ── V2: single QA row inside a group card ── */
  function QARow({ check, variant, isLast, onOpenRequestModal, onOpenIgnoreModal, onResetCheck }) {
    const isError = variant === 'error';
    const isWarn  = variant === 'warning';
    const isPass  = variant === 'pass';
    const hasNote = !!check.override?.note;
    const isRequested = check.status === 'requested';
    const isIgnored   = check.status === 'ignored';

    const text = isPass ? check.name : (check.result || check.name);

    const borderClass = isLast ? '' : 'border-b border-[#eceff1]';

    return (
      <React.Fragment>
        {/* Left cell: icon + text */}
        <div className={`flex items-center gap-2 px-3 min-h-10 py-1.5 bg-white ${borderClass}`}>
          {isError && <span className="icon text-[20px] text-[#e64d4d] flex-shrink-0" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>cancel</span>}
          {isWarn  && <span className="flex-shrink-0 inline-flex"><WarnIcon size={20} /></span>}
          {isPass  && <span className="icon text-[20px] text-[#20bf6b] flex-shrink-0" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 700,'GRAD' 0,'opsz' 20" }}>check</span>}
          <span className={`text-[12px] leading-[16px] tracking-[0.2px] break-words ${isError ? 'font-medium text-[#e64d4d]' : 'text-[#4b5961]'}`}>{text}</span>
        </div>

        {/* Right cell: actions (skipped for pass variant) */}
        {!isPass && (
          <div className={`flex items-center justify-end gap-2 pl-2 pr-3 min-h-10 py-1.5 bg-white ${borderClass}`}>
            {/* Note icon when a note has been added */}
            {hasNote && !isRequested && <ChatNoteIcon override={check.override} />}

            {/* Fehler — default state */}
            {isError && !hasNote && !isRequested && (
              <>
                {check.remediation?.type === 'request_document' && (
                  <button onClick={() => onOpenRequestModal(check)}
                    className="h-6 px-2 rounded-[4px] bg-primary-500 text-white text-[14px] font-medium leading-[20px] hover:bg-primary-600 transition-colors flex items-center whitespace-nowrap">
                    {check.remediation.label}
                  </button>
                )}
                <button onClick={() => onOpenIgnoreModal(check)}
                  className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[14px] font-medium leading-[20px] text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                  Ignorieren
                </button>
              </>
            )}

            {/* Fehler — angefordert state */}
            {isError && isRequested && (
              <>
                <span className="h-4 px-2 rounded-[4px] bg-[#546e7a] text-white text-[11px] font-medium leading-[16px] tracking-[0.25px] inline-flex items-center whitespace-nowrap">
                  {check.result}
                </span>
                <button onClick={() => onResetCheck(check.id)}
                  className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[14px] font-medium leading-[20px] text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                  Zurücksetzen
                </button>
              </>
            )}

            {/* Fehler — ignored with note state */}
            {isError && isIgnored && (
              <button onClick={() => onResetCheck(check.id)}
                className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[14px] font-medium leading-[20px] text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                Zurücksetzen
              </button>
            )}

            {/* Warnungen — always shows "Notiz hinzufügen" (acts as edit when note exists) */}
            {isWarn && (
              <button onClick={() => onOpenIgnoreModal(check)}
                className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[14px] font-medium leading-[20px] text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                Notiz hinzufügen
              </button>
            )}
          </div>
        )}
      </React.Fragment>
    );
  }

  /* ── V2: group card (Fehler / Warnungen / Bestanden) ── */
  function GroupCard({ variant, rows, isAllPassed, totalCount, onOpenRequestModal, onOpenIgnoreModal, onResetCheck }) {
    const titleLabels = { error: 'Fehler', warning: 'Warnungen', pass: 'Bestanden' };
    const [expanded, setExpanded] = React.useState(variant !== 'pass');

    const gridCols = variant === 'pass' ? 'minmax(0, 1fr)' : 'minmax(0, 1fr) max-content';

    return (
      <div className="rounded-[8px] overflow-hidden border border-[#eaeaea] w-full">

          {isAllPassed && (
            <div className="flex items-center gap-1">

              <span className="text-[12px] font-medium text-[#20bf6b] leading-[16px]">{rows.length}/{totalCount} bestanden</span>
            </div>
          )}
        </button>

        {expanded && rows.length > 0 && (
          <div className="grid" style={{ gridTemplateColumns: gridCols }}>
            {rows.map((check, i) => (
              <QARow key={check.id} check={check} variant={variant} isLast={i === rows.length - 1}
                onOpenRequestModal={onOpenRequestModal}
                onOpenIgnoreModal={onOpenIgnoreModal}
                onResetCheck={onResetCheck}
              />
            ))}
          </div>
        )}
      </div>
    );
  }

  /* ── V2: top-level QA panel with three grouped cards ── */
  function QAPanel({ doc, checks, onChecksUpdate, onOpenRequestModal, onOpenIgnoreModal, onResetCheck, onRerun }) {
    const [isRunning, setIsRunning] = React.useState(false);

    // Categorize by ORIGINAL status so ignored/requested rows stay in their home group
    const errors = [], warnings = [], passed = [];
    checks.forEach(c => {
      const orig = (QA_CHECKS[doc?.id] || []).find(x => x.id === c.id);
      const origStatus = orig?.status || c.status;
      if (origStatus === 'fail') errors.push(c);
      else if (origStatus === 'warning') warnings.push(c);
      else if (c.status === 'pass') passed.push(c);
    });

    const totalCount = errors.length + warnings.length + passed.length;
    const allPassed = errors.length === 0 && warnings.length === 0 && passed.length > 0;

    function handleRerun() {
      setIsRunning(true);
      setTimeout(() => { setIsRunning(false); onRerun(); }, 2000);
    }

    return (
      <div className={`flex flex-col gap-3 min-w-[640px] ${allPassed ? 'w-full max-w-[640px]' : 'w-fit max-w-full'}`}>
        {/* Rerun button — above the tables */}
        <div className="flex items-center justify-start -mb-2">
          <button onClick={handleRerun} disabled={isRunning}
            className="flex items-center gap-1 py-[2px] text-[14px] font-medium text-primary-500 hover:text-primary-600 transition-colors disabled:opacity-60 whitespace-nowrap">
            <span className={`icon text-[16px] ${isRunning ? 'animate-spin' : ''}`} style={{ lineHeight:1 }}>
              {isRunning ? 'progress_activity' : 'sync'}
            </span>
            {isRunning ? 'Läuft …' : 'Prüfungen wiederholen'}
          </button>
        </div>

        {allPassed ? (
          <GroupCard variant="pass" rows={passed} isAllPassed totalCount={totalCount} />
        ) : (
          <>
            {errors.length > 0 && (
              <GroupCard variant="error" rows={errors}
                onOpenRequestModal={onOpenRequestModal}
                onOpenIgnoreModal={onOpenIgnoreModal}
                onResetCheck={onResetCheck}
              />
            )}
            {warnings.length > 0 && (
              <GroupCard variant="warning" rows={warnings}
                onOpenIgnoreModal={onOpenIgnoreModal}
                onResetCheck={onResetCheck}
              />
            )}
            {passed.length > 0 && (
              <GroupCard variant="pass" rows={passed} />
            )}
          </>
        )}
      </div>
    );
  }

            </button>
            <div className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-[#009688] rounded-full flex items-center justify-center">
              <span className="text-[10px] font-medium text-white leading-none">4</span>
            </div>
          </div>
          {/* More menu */}
          <button className="w-9 h-9 flex items-center justify-center border border-[#b0bec5] rounded text-[#4b5961] hover:bg-neutral-50 transition-colors">
            <span className="icon text-[20px]">more_horiz</span>
          </button>
          {/* Divider */}
          <div className="w-px h-10 bg-[#eceff1] mx-1" />
          {/* Avatar */}
          <div className="w-8 h-8 rounded-full bg-[#b0bec5] flex items-center justify-center flex-shrink-0">
            <span className="icon text-[20px] text-white">person</span>
          </div>
          {/* User info */}
          <div className="flex items-center gap-1">
            <div className="flex flex-col items-start">
              <span className="text-[14px] text-[#4b5961] leading-[20px] tracking-[0.25px] whitespace-nowrap">Jan Joisten</span>
              <span className="text-[12px] text-[#78909c] leading-[16px] whitespace-nowrap">Berater/in</span>
            </div>
            <span className="icon text-[20px] text-[#4b5961]">expand_more</span>
          </div>
        </div>

      </header>
    );
  }

  /* ── App ── */
  function App() {
    const [selectedId, setSelectedId] = React.useState(null);

    /* QA checks state — keyed by doc id, initialised from QA_CHECKS */
    const [docChecks, setDocChecks] = React.useState(() => {
      const init = {};
      ALL_DOCS.forEach(d => {
        init[d.id] = (QA_CHECKS[d.id] || DEFAULT_QA_CHECKS).map(c => ({ ...c }));
      });
      return init;
    });

    const [ignoreModal, setIgnoreModal] = React.useState(null);
    const [requestModal, setRequestModal] = React.useState(null);

    /* Toast with optional undo */
    const [toast, setToast] = React.useState({ visible: false, message: '', onUndo: null });
    const toastTimerRef = React.useRef(null);
    function showToast(msg, onUndo = null) {
      clearTimeout(toastTimerRef.current);
      setToast({ visible: true, message: msg, onUndo });
      toastTimerRef.current = setTimeout(() => setToast({ visible: false, message: '', onUndo: null }), 8000);
    }
    function dismissToast() {
      clearTimeout(toastTimerRef.current);
      setToast({ visible: false, message: '', onUndo: null });
    }

    /* Supporting slots — keyed by parent doc id */
    const [supportingSlots, setSupportingSlots] = React.useState({});

    /* Doc status overrides — set when advisor manually approves a doc */
    const [docStatusOverrides, setDocStatusOverrides] = React.useState({});

    /* Compute which docs have at least one ignored check with a note */
    const ignoredNotesByDoc = React.useMemo(() => {
      const result = {};
      Object.entries(docChecks).forEach(([docId, checks]) => {
        const ignoredWithNote = checks.find(c => c.status === 'ignored' && c.override?.note);
        if (ignoredWithNote) result[Number(docId)] = ignoredWithNote.override;
      });
      return result;
    }, [docChecks]);

    function handleApproveDoc() {
      if (!selectedDoc) return;
      setDocStatusOverrides(prev => ({ ...prev, [selectedDoc.id]: 'ok' }));
      showToast('Dokument genehmigt');
    }

    const selectedDoc       = ALL_DOCS.find(d => d.id === selectedId) ?? null;
    const effectiveDocStatus = selectedDoc ? (docStatusOverrides[selectedDoc.id] ?? selectedDoc.docStatus) : null;
    const selectedSlot   = !selectedDoc ? Object.values(supportingSlots).flat().find(s => s.id === selectedId) ?? null : null;
    const activeDocNote  = selectedDoc?.note ?? null;
    const currentChecks  = selectedDoc && QA_CHECKS[selectedDoc.id] ? (docChecks[selectedDoc.id] || []) : [];

    function updateCheck(docId, checkId, updates) {
      setDocChecks(prev => ({
        ...prev,
        [docId]: prev[docId].map(c => c.id === checkId ? { ...c, ...updates } : c),
      }));
    }

    function handleConfirmRequest(check, note) {
      const docId = selectedDoc.id;
      const slotId = `slot-${Date.now()}`;
      const newSlot = { id: slotId, name: check.remediation.slotName || check.remediation.label, docStatus: 'pending', note: note || null };
      const origCheck = (QA_CHECKS[docId] || []).find(c => c.id === check.id);

      setSupportingSlots(prev => ({ ...prev, [docId]: [...(prev[docId] || []), newSlot] }));
      updateCheck(docId, check.id, { status: 'requested', result: check.remediation.label.replace(/\s*anfordern$/i, '') + ' angefordert' });
      setRequestModal(null);

      showToast(
        'Anfrage gesendet. Der Kunde sieht den Ablehnungsgrund und die nächsten Schritte in seinem Dashboard.',
        () => {
          setSupportingSlots(prev => ({ ...prev, [docId]: (prev[docId] || []).filter(s => s.id !== slotId) }));
          if (origCheck) updateCheck(docId, check.id, { ...origCheck });
        }
      );
    }

    function handleIgnoreConfirm(check, note) {
      const orig = (QA_CHECKS[selectedDoc.id] || []).find(c => c.id === check.id);
      const isWarning = orig?.status === 'warning';
      updateCheck(selectedDoc.id, check.id, {
        status: isWarning ? 'warning' : 'ignored',
        override: {
          note,
          advisorName: ADVISOR.name,
          initials: ADVISOR.initials,
          timestamp: new Date().toISOString(),
        },
      });
      setIgnoreModal(null);
      showToast(isWarning ? 'Notiz hinzugefügt' : 'Prüfung wurde ignoriert');
    }

    function handleResetCheck(checkId) {
      const orig = (QA_CHECKS[selectedDoc?.id] || []).find(c => c.id === checkId);
      if (orig) updateCheck(selectedDoc.id, checkId, { ...orig });
    }

    function handleRerun() {
      showToast('✓ Prüfungen wurden aktualisiert');
    }

    return (
      <div className="h-screen flex flex-col overflow-hidden">
        <Header />
        <div className="flex flex-1 overflow-hidden">
          <Sidebar
            selectedId={selectedId}
            onSelect={setSelectedId}
            supportingSlots={supportingSlots}
            docStatusOverrides={docStatusOverrides}
            ignoredNotesByDoc={ignoredNotesByDoc}
          />
          <DocumentViewer
            doc={selectedDoc}
            slot={selectedSlot}
            docNote={activeDocNote}
            checks={currentChecks}
            onOpenRequestModal={(check) => setRequestModal(check)}
            onOpenIgnoreModal={(check) => setIgnoreModal(check)}
            onChecksUpdate={(checkId, updates) => updateCheck(selectedDoc?.id, checkId, updates)}
            onResetCheck={handleResetCheck}
            onRerun={handleRerun}
            onApproveDoc={handleApproveDoc}
            effectiveDocStatus={effectiveDocStatus}
          />
          <PageRail doc={selectedDoc} />
        </div>

        {ignoreModal && (
          <IgnoreCheckModal
            check={ignoreModal}
            onConfirm={handleIgnoreConfirm}
            onClose={() => setIgnoreModal(null)}
          />
        )}
        {requestModal && (
          <RequestDocModal
            check={requestModal}
            doc={selectedDoc}
            onConfirm={handleConfirmRequest}
            onClose={() => setRequestModal(null)}
          />
        )}
        <Toast message={toast.message} visible={toast.visible} onUndo={toast.onUndo} onDismiss={dismissToast} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
