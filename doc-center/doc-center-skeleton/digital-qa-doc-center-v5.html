<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalQA Doc Center V5 – Structured Check Table</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Roboto', 'sans-serif'] },
          colors: {
            primary: { 100: '#E6F5F3', 500: '#009688', 600: '#00877A', 700: '#00695c' },
            neutral: {
              50:  '#FAFAFA', 100: '#F5F5F5', 200: '#EEEEEE', 300: '#E0E0E0',
              400: '#BDBDBD', 500: '#9E9E9E', 600: '#757575', 700: '#616161',
              800: '#424242', 900: '#212121',
            },
            /* QA status — from Figma UI-Kit tokens */
            'qa-pass':           '#20BF6B',
            'qa-pass-light':     '#E9FCF2',
            'qa-warn':           '#FF9F1A',
            'qa-warn-light':     '#FFF5E8',
            'qa-fail':           '#FF5656',
            'qa-fail-light':     '#FFEEEE',
            'qa-ignored':        '#4B7BEC',
            'qa-ignored-light':  '#EBF0FB',
            'qa-pending':        '#78909C',
            'qa-pending-light':  '#ECEFF1',
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'Roboto', sans-serif; }
    .icon {
      font-family: 'Material Symbols Outlined'; font-style: normal;
      font-size: 20px; line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      user-select: none;
    }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

  /* ── Data ── */
  const GROUPS = [
    {
      id: 'unkategorisiert',
      label: 'Unkategorisiert',
      icon: 'folder_open',
      items: [
        { id: 101, name: 'Unkategorisierte Seiten', docStatus: 'pending' },
      ]
    },
    {
      id: 'persoenlich',
      label: 'Persönliche Dokumente',
      icon: 'person',
      newCount: 2,
      items: [
        { id: 201, name: 'Gehaltsabrechnung Juli',    docStatus: 'pending', isNew: true,
          warnings: ['IBAN fehlt auf der Gehaltsabrechnung'] },
        { id: 202, name: 'Gehaltsabrechnung September', docStatus: 'ok' },
        { id: 204, name: 'Gehaltsabrechnung August',       docStatus: 'pending' },
        { id: 205, name: 'Beidseitige Ausweiskopie (gültiger EU-Personalausweis oder Reisepass)', docStatus: 'pending',
          warnings: ['Nur Reisepass hochgeladen – Meldebescheinigung erforderlich'],
          note: 'Wir haben Ihren Reisepass erhalten. Um Ihren Antrag weiterzubearbeiten, benötigen wir zusätzlich eine aktuelle Meldebescheinigung.' },
        { id: 206, name: 'Aufenthaltstitel', docStatus: 'pending',
          warnings: ['Aufenthaltstitel läuft in weniger als 6 Monaten ab'] },
      ]
    },
    {
      id: 'immobilien',
      label: 'Immobilienunterlagen',
      icon: 'home',
      items: [
        { id: 301, name: 'Vollständiger aktueller Grundbuchauszug (max. 3 Monate alt)', docStatus: 'ok' },
        { id: 302, name: 'Wohnflächenberechnung (mit Angabe von Länge und Breite je Raum)', docStatus: 'ok',
          warnings: ['Maße bei Raum 3 fehlen', 'Stempel des Architekten fehlt'] },
        { id: 303, name: 'Aktuelle Flurkarte/Lageplan',  docStatus: 'ok' },
        { id: 304, name: 'Baubeschreibung',              docStatus: 'pending' },
        { id: 305, name: 'Kaufvertragsentwurf',          docStatus: 'ok' },
        { id: 306, name: 'Bemaßte Baupläne (evtl. fehlende Maßangaben bitte zwingend ergänzen)', docStatus: 'ok' },
        { id: 307, name: 'Exposé',                       docStatus: 'rejected',
          rejectedReasons: ['Dokument unleserlich – bitte erneut scannen', 'Exposé veraltet (älter als 3 Monate)'] },
        { id: 308, name: 'Aktuelle Objektfotos in Farbe von Innen und Außen (je mind. 2)', docStatus: 'ok' },
        { id: 309, name: 'Energieausweis', docStatus: 'rejected',
          rejectedReasons: ['Gültigkeitsdatum abgelaufen – automatisch abgelehnt'] },
      ]
    }
  ];

  /* all items flattened for viewer lookup */
  const ALL_DOCS = GROUPS.flatMap(g => g.items);

  /* ── Sub-components ── */

  /* Warning triangle — Material Symbols "warning" filled (Figma node 3613:280, Icon-library) */
  function WarnIcon({ size = 16, className = '', color = '#FF9F1A' }) {
    return (
      <span className={`icon ${className}`}
        style={{ fontSize: size, color, lineHeight: 1, flexShrink: 0, display: 'inline-block',
          fontVariationSettings: "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20" }}>
        warning
      </span>
    );
  }

  /* ── Tooltip (portal, bypasses overflow clipping) ── */
  function Tooltip({ anchor, children }) {
    if (!anchor) return null;
    const TIP_W = 248;
    const GAP   = 6;
    const PAD   = 8;

    // Center on anchor, then clamp so neither edge leaves the viewport
    const rawLeft = anchor.left + anchor.width / 2 - TIP_W / 2;
    const left = Math.max(PAD, Math.min(rawLeft, window.innerWidth - TIP_W - PAD));

    // Prefer above; fall back to below when near the top of the screen
    const above = anchor.top > 180;
    const vertical = above
      ? { bottom: window.innerHeight - anchor.top + GAP }
      : { top: anchor.bottom + GAP };

    const style = {
      position: 'fixed',
      zIndex: 9999,
      left,
      width: TIP_W,
      ...vertical,
      pointerEvents: 'none',
    };
    return ReactDOM.createPortal(
      <div style={style} className="bg-white border border-neutral-200 rounded-lg shadow-lg overflow-hidden text-left">
        {children}
      </div>,
      document.body
    );
  }

  /* ── Lightweight icon tooltip (below the trigger, 200ms delay) ── */
  function IconTooltip({ label, children }) {
    const [anchor, setAnchor] = React.useState(null);
    const [show, setShow] = React.useState(false);
    const ref = React.useRef(null);
    const timerRef = React.useRef(null);

    function handleEnter() {
      clearTimeout(timerRef.current);
      timerRef.current = setTimeout(() => {
        if (ref.current) {
          setAnchor(ref.current.getBoundingClientRect());
          setShow(true);
        }
      }, 200);
    }
    function handleLeave() {
      clearTimeout(timerRef.current);
      setShow(false);
    }

    return (
      <div ref={ref} onMouseEnter={handleEnter} onMouseLeave={handleLeave} className="inline-flex">
        {children}
        {show && anchor && ReactDOM.createPortal(
          <div
            style={{
              position: 'fixed',
              top: anchor.bottom + 6,
              left: anchor.left + anchor.width / 2,
              transform: 'translateX(-50%)',
              zIndex: 9999,
              pointerEvents: 'none',
            }}
            className="bg-[#37474f] text-white text-[12px] font-medium px-2 py-1 rounded whitespace-nowrap shadow-md"
          >
            {label}
          </div>,
          document.body
        )}
      </div>
    );
  }

  /* ── Click-triggered dropdown for the three-dot icon ── */
  function MoreMenu({ items }) {
    const [open, setOpen] = React.useState(false);
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);

    React.useEffect(() => {
      function handleClick(e) {
        if (ref.current && !ref.current.contains(e.target)) setOpen(false);
      }
      if (open) document.addEventListener('mousedown', handleClick);
      return () => document.removeEventListener('mousedown', handleClick);
    }, [open]);

    function toggle() {
      if (!open && ref.current) setAnchor(ref.current.getBoundingClientRect());
      setOpen(x => !x);
    }

    return (
      <div ref={ref} className="inline-flex">
        <button onClick={toggle} aria-label="Mehr Optionen"
          className={`w-8 h-8 flex items-center justify-center rounded-md transition-colors
            ${open ? 'bg-neutral-200 text-[#37474f]' : 'text-neutral-500 hover:bg-neutral-100 hover:text-[#37474f]'}`}>
          <span className="icon text-[20px]">more_horiz</span>
        </button>
        {open && anchor && ReactDOM.createPortal(
          <div
            style={{
              position: 'fixed',
              top: anchor.bottom + 6,
              right: window.innerWidth - anchor.right,
              minWidth: 240,
              zIndex: 9999,
            }}
            className="bg-white border border-neutral-200 rounded-lg shadow-lg py-1 overflow-hidden"
          >
            {items.map((it, i) => (
              <button key={i}
                onClick={() => { it.onClick?.(); setOpen(false); }}
                className="w-full flex items-center gap-2 px-3 py-2 text-[13px] text-[#37474f] hover:bg-neutral-100 transition-colors text-left">
                {it.icon && <span className="icon text-[16px] text-neutral-500 flex-shrink-0">{it.icon}</span>}
                <span className="flex-1">{it.label}</span>
              </button>
            ))}
          </div>,
          document.body
        )}
      </div>
    );
  }

  /* ── Toolbar button: customer-facing notes (popover with edit/delete/add) ── */
  function CustomerNotesButton({ notes, onAdd, onEdit, onDelete }) {
    const [open, setOpen] = React.useState(false);
    const [anchor, setAnchor] = React.useState(null);
    const [editingId, setEditingId] = React.useState(null);
    const [editText, setEditText] = React.useState('');
    const [adding, setAdding] = React.useState(false);
    const [addText, setAddText] = React.useState('');
    const containerRef = React.useRef(null);
    const buttonRef = React.useRef(null);

    React.useEffect(() => {
      function handleClick(e) {
        if (containerRef.current && !containerRef.current.contains(e.target)) {
          setOpen(false); setEditingId(null); setAdding(false);
        }
      }
      function handleEsc(e) {
        if (e.key === 'Escape') { setOpen(false); setEditingId(null); setAdding(false); }
      }
      if (open) {
        document.addEventListener('mousedown', handleClick);
        document.addEventListener('keydown', handleEsc);
      }
      return () => {
        document.removeEventListener('mousedown', handleClick);
        document.removeEventListener('keydown', handleEsc);
      };
    }, [open]);

    function toggle() {
      if (!open && buttonRef.current) setAnchor(buttonRef.current.getBoundingClientRect());
      setOpen(x => !x);
      setEditingId(null);
      setAdding(false);
    }

    function startEdit(n) {
      setEditingId(n.id);
      setEditText(n.note);
      setAdding(false);
    }
    function commitEdit() {
      if (editText.trim()) onEdit(editingId, editText.trim());
      setEditingId(null);
      setEditText('');
    }
    function cancelEdit() { setEditingId(null); setEditText(''); }

    function startAdd() {
      setAdding(true);
      setAddText('');
      setEditingId(null);
    }
    function commitAdd() {
      if (addText.trim()) onAdd(addText.trim());
      setAdding(false);
      setAddText('');
    }
    function cancelAdd() { setAdding(false); setAddText(''); }

    const count = notes?.length || 0;
    const popoverContent = open && anchor && ReactDOM.createPortal(
      <div ref={containerRef}
        style={{
          position: 'fixed',
          top: anchor.bottom + 6,
          right: Math.max(8, window.innerWidth - anchor.right),
          width: 400,
          zIndex: 9999,
          maxHeight: 'calc(100vh - 120px)',
        }}
        className="bg-white border border-neutral-200 rounded-lg shadow-lg overflow-hidden flex flex-col">
        {/* Header */}
        <div className="px-4 py-3 border-b border-neutral-200 flex items-center justify-between">
          <div className="flex flex-col leading-tight">
            <span className="text-[13px] font-medium text-[#37474f]">Notizen für Kunde ({count})</span>
            <span className="text-[11px] text-neutral-400 mt-0.5">Sichtbar im Kundendashboard</span>
          </div>
          <button onClick={() => { setOpen(false); setEditingId(null); setAdding(false); }}
            className="w-6 h-6 flex items-center justify-center rounded hover:bg-neutral-100 text-neutral-500">
            <span className="icon text-[18px]">close</span>
          </button>
        </div>

        {/* List */}
        <div className="flex-1 overflow-y-auto">
          {/* Add note (inline) */}
          {adding && (
            <div className="px-4 py-3 border-b border-neutral-100 bg-neutral-50">
              <textarea autoFocus value={addText} onChange={e => setAddText(e.target.value)}
                placeholder="Notiz für Kunde..."
                className="w-full px-2 py-1.5 text-[13px] leading-snug border border-[#cfd8dc] rounded resize-none focus:outline-none focus:border-primary-500"
                style={{ height: 72 }} />
              <div className="flex items-center justify-end gap-2 mt-2">
                <button onClick={cancelAdd} className="text-[12px] font-medium text-[#4b5961] hover:text-neutral-900 px-2 py-1">
                  Abbrechen
                </button>
                <button onClick={commitAdd} disabled={!addText.trim()}
                  className="text-[12px] font-medium text-white bg-primary-500 hover:bg-primary-600 disabled:opacity-50 px-3 py-1 rounded">
                  Speichern
                </button>
              </div>
            </div>
          )}

          {/* Empty state */}
          {count === 0 && !adding && (
            <div className="px-4 py-6 text-center">
              <p className="text-[12px] text-neutral-400">Keine Notizen für Kunde</p>
            </div>
          )}

          {/* Notes */}
          {notes?.map((n, i) => {
            const ts = n.timestamp ? new Date(n.timestamp) : null;
            const dateStr = ts
              ? ts.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
                + ' · ' + ts.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
              : '';
            const isEditing = editingId === n.id;
            return (
              <div key={n.id} className={`px-4 py-3 ${i < notes.length - 1 ? 'border-b border-neutral-100' : ''}`}>
                <div className="flex items-center gap-2 mb-1.5">
                  <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-neutral-200 text-[#78909c] text-[10px] font-medium flex-shrink-0">
                    {n.initials ?? '??'}
                  </span>
                  <div className="flex flex-col leading-tight flex-1 min-w-0">
                    <span className="text-[12px] font-medium text-[#4b5961] truncate">{n.advisorName ?? '–'}</span>
                    <span className="text-[10px] text-neutral-400">{dateStr}</span>
                  </div>
                  {!isEditing && (
                    <div className="flex items-center gap-0.5 flex-shrink-0">
                      <button onClick={() => startEdit(n)} title="Bearbeiten"
                        className="w-6 h-6 flex items-center justify-center rounded text-neutral-500 hover:bg-neutral-100 hover:text-[#37474f]">
                        <span className="icon text-[16px]">edit</span>
                      </button>
                      <button onClick={() => onDelete(n.id)} title="Löschen"
                        className="w-6 h-6 flex items-center justify-center rounded text-neutral-500 hover:bg-neutral-100 hover:text-red-500">
                        <span className="icon text-[16px]">delete</span>
                      </button>
                    </div>
                  )}
                </div>
                {isEditing ? (
                  <div>
                    <textarea autoFocus value={editText} onChange={e => setEditText(e.target.value)}
                      className="w-full px-2 py-1.5 text-[13px] leading-snug border border-[#cfd8dc] rounded resize-none focus:outline-none focus:border-primary-500"
                      style={{ height: 72 }} />
                    <div className="flex items-center justify-end gap-2 mt-2">
                      <button onClick={cancelEdit} className="text-[12px] font-medium text-[#4b5961] hover:text-neutral-900 px-2 py-1">
                        Abbrechen
                      </button>
                      <button onClick={commitEdit} disabled={!editText.trim()}
                        className="text-[12px] font-medium text-white bg-primary-500 hover:bg-primary-600 disabled:opacity-50 px-3 py-1 rounded">
                        Speichern
                      </button>
                    </div>
                  </div>
                ) : (
                  <p className="text-[13px] text-[#37474f] leading-snug whitespace-pre-wrap">{n.note}</p>
                )}
              </div>
            );
          })}
        </div>

        {/* Footer: Add note CTA */}
        {!adding && (
          <div className="border-t border-neutral-200 px-4 py-2 bg-neutral-50">
            <button onClick={startAdd}
              className="flex items-center gap-1 text-[13px] font-medium text-primary-500 hover:text-primary-600 transition-colors">
              <span className="icon text-[16px]">add</span>
              Notiz hinzufügen
            </button>
          </div>
        )}
      </div>,
      document.body
    );

    return (
      <div ref={buttonRef} className="inline-flex relative">
        <IconTooltip label="Notizen für Kunde">
          <button onClick={toggle} aria-label="Notizen für Kunde"
            className={`w-8 h-8 flex items-center justify-center rounded-md transition-colors relative
              ${open ? 'bg-neutral-200 text-[#37474f]' : 'text-neutral-500 hover:bg-neutral-100 hover:text-[#37474f]'}`}>
            <span className="icon text-[20px]">forum</span>
            {count > 0 && (
              <span className="absolute -top-0.5 -right-0.5 min-w-[14px] h-[14px] px-[3px] bg-[#009688] rounded-full flex items-center justify-center">
                <span className="text-[9px] font-bold text-white leading-none">{count}</span>
              </span>
            )}
          </button>
        </IconTooltip>
        {popoverContent}
      </div>
    );
  }

  /* ── DocStatusBadge — left of document name ── */
  function DocStatusBadge({ docStatus, rejectedReasons = [] }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);

    function StatusIcon() {
      if (docStatus === 'ok')
        return <span className="icon icon-filled text-[18px] text-green-500 leading-none">check_circle</span>;
      if (docStatus === 'rejected')
        return <span className="icon icon-filled text-[18px] text-red-500 leading-none">cancel</span>;
      /* pending — filled circle with white hourglass */
      return (
        <span className="w-[18px] h-[18px] rounded-full bg-neutral-400 inline-flex items-center justify-center flex-shrink-0 overflow-hidden">
          <span className="icon text-[11px] text-white" style={{ fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20", lineHeight: 1, display: 'block' }}>hourglass_empty</span>
        </span>
      );
    }

    const labels = { ok: 'Genehmigt', pending: 'Ausstehend', rejected: 'Abgelehnt' };

    return (
      <div
        ref={ref}
        className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}
      >
        <StatusIcon />
        <Tooltip anchor={anchor}>
          {docStatus === 'rejected' ? (
            <>
              <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-1.5 bg-red-50">
                <span className="icon icon-filled text-[14px] text-red-500">cancel</span>
                <span className="text-[11px] font-medium text-red-600 uppercase tracking-wide">Abgelehnt</span>
              </div>
              {rejectedReasons.length > 0 && (
                <ul className="px-3 py-2.5 flex flex-col gap-1.5">
                  {rejectedReasons.map((r, i) => (
                    <li key={i} className="flex items-start gap-2 text-[12px] text-neutral-700 leading-snug">
                      <span className="mt-[5px] w-1.5 h-1.5 rounded-full bg-red-400 flex-shrink-0" />
                      {r}
                    </li>
                  ))}
                </ul>
              )}
            </>
          ) : (
            <div className="px-3 py-2.5 flex items-center gap-2">
              <StatusIcon />
              <span className="text-[12px] text-neutral-700 font-medium">{labels[docStatus] || 'Ausstehend'}</span>
            </div>
          )}
        </Tooltip>
      </div>
    );
  }

  /* ── WarningBadge — amber triangle while open, switches to blue info icon when all resolved ── */
  function WarningBadge({ docId, dynamicChecks = [] }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);

    // Only original fail/warning checks are tracked here
    const origItems = (QA_CHECKS[docId] || []).filter(c => c.status === 'fail' || c.status === 'warning');
    if (origItems.length === 0) return null;

    // Match each original to its current dynamic state
    const items = origItems.map(o => {
      const cur = dynamicChecks.find(c => c.id === o.id);
      return { original: o, current: cur, currentStatus: cur?.status ?? o.status };
    });

    const hasOpen = items.some(i => i.currentStatus === 'fail' || i.currentStatus === 'warning');
    const resolved = !hasOpen;
    // A red (critical) triangle wins over amber whenever any open critical error remains
    const hasOpenFail = items.some(i => i.currentStatus === 'fail');
    // Counter badge = open issues only (critical + warnings); passed/resolved checks excluded
    const openCount = items.filter(i => i.currentStatus === 'fail' || i.currentStatus === 'warning').length;

    return (
      <div
        ref={ref}
        className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}
      >
        {/* Icon switches based on state */}
        {resolved ? (
          <span className="icon icon-filled text-[18px] text-qa-ignored" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>info</span>
        ) : (
          <WarnIcon size={18} color={hasOpenFail ? '#FF5656' : '#FF9F1A'} />
        )}

        <Tooltip anchor={anchor}>
          <ul className="px-3 py-2.5 flex flex-col gap-2">
            {items.map((it, i) => {
              const cs = it.currentStatus;
              const isItemResolved = cs === 'manually_released' || cs === 'requested' || cs === 'pass';
              const dotClass = isItemResolved ? 'bg-qa-pass' : (cs === 'fail' ? 'bg-qa-fail' : 'bg-amber-400');
              return (
                <li key={i} className="flex flex-col gap-0.5">
                  <div className="flex items-start gap-2 text-[12px] leading-snug">
                    <span className={`mt-[5px] w-1.5 h-1.5 rounded-full flex-shrink-0 ${dotClass}`} />
                    <span className={isItemResolved ? 'text-neutral-500 line-through' : 'text-neutral-700'}>
                      {it.original.result || it.original.name}
                    </span>
                  </div>
                  {/* Show the resolution note inline */}
                  {it.current?.manualRelease?.reason && (
                    <p className="pl-3.5 text-[11px] italic text-[#4b5961] leading-snug">↳ Begründung: „{it.current.manualRelease.reason}"</p>
                  )}
                  {it.current?.requestNote?.note && (
                    <p className="pl-3.5 text-[11px] italic text-[#4b5961] leading-snug">↳ Notiz für Kunde: „{it.current.requestNote.note}"</p>
                  )}
                </li>
              );
            })}
          </ul>
        </Tooltip>

  /* Renders a list of notes (newest first), with avatar/timestamp header per entry */
  function NoteList({ notes }) {
    if (!notes || notes.length === 0) return null;
    return (
      <div className="flex flex-col max-h-[400px] overflow-y-auto">
        {notes.map((n, i) => {
          const ts = n?.timestamp ? new Date(n.timestamp) : null;
          const dateStr = ts
            ? ts.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
              + ' · ' + ts.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
            : '';
          return (
            <React.Fragment key={i}>
              {i > 0 && <div className="h-px bg-neutral-200" />}
              <div className="px-3 py-2 flex items-center gap-2 bg-neutral-50">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-neutral-500 text-white text-[10px] font-bold flex-shrink-0">
                  {n?.initials ?? '??'}
                </span>
                <div className="flex flex-col leading-tight">
                  <span className="text-[11px] font-medium text-neutral-700">{n?.advisorName ?? '–'}</span>
                  <span className="text-[10px] text-neutral-400">{dateStr}</span>
                </div>
              </div>
              <div className="px-3 py-2">
                <p className="text-[12px] text-neutral-700 leading-snug">{n?.note}</p>
              </div>
            </React.Fragment>
          );
        })}
      </div>
    );
  }

  /* Sidebar note icon — orange chat bubble with all notes in a hover tooltip */
  function SidebarIgnoreNoteIcon({ notes }) {
    const [anchor, setAnchor] = React.useState(null);

    if (!notes || notes.length === 0) return null;
    return (
      <div ref={ref} className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}>
        <span className="icon text-[18px] text-qa-warn" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>chat</span>
        <Tooltip anchor={anchor}>
          <NoteList notes={notes} />
        </Tooltip>
      </div>

  function NewBadge() {
    return (
      <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">
        Neu
      </span>
    );

  function Checkbox({ checked, onChange }) {
    return (
      <input
        type="checkbox"
        checked={checked}
        onChange={onChange}
        onClick={e => e.stopPropagation()}
        className="w-4 h-4 rounded-md border-neutral-300 accent-[#78909C] flex-shrink-0 cursor-pointer"
      />
    );
  }

  function CategoryGroup({ group, selectedId, onSelect, checkedIds, onCheck, supportingSlots = {}, docStatusOverrides = {}, ignoredNotesByDoc = {}, dynamicChecksByDoc = {} }) {
    const [open, setOpen] = React.useState(false);
    const approvedCount = group.items.filter(i => (docStatusOverrides[i.id] ?? i.docStatus) === 'ok').length;
    const totalCount = group.items.length;

    // Dynamic count of "Neu" docs in this group: isNew=true AND no advisor action taken yet
    function itemHasActionBeenTaken(item) {
      const effective = docStatusOverrides[item.id] ?? item.docStatus;
      if (effective === 'ok' || effective === 'rejected') return true;
      const dyn = dynamicChecksByDoc[item.id];
      const orig = QA_CHECKS[item.id];
      if (!dyn || !orig) return false;
      return orig.some(o => {
        const cur = dyn.find(c => c.id === o.id);
        if (!cur) return false;
        if (cur.status !== o.status) return true;
        if (cur.manualRelease) return true;
        if (cur.requestNote) return true;
        if (cur.notes && cur.notes.length > 0) return true;
        return false;
      });
    }
    const liveNewCount = group.items.filter(i => i.isNew && !itemHasActionBeenTaken(i)).length;

    function handleHeaderClick() {
      const opening = !open;
      setOpen(opening);
      if (opening && group.items.length > 0) {
        onSelect(group.items[0].id);
      }
    }

    return (
      <div className="bg-white rounded-lg border border-neutral-200">
        {/* Category header */}
        <div
          className="flex items-center gap-2 px-4 cursor-pointer bg-white hover:bg-neutral-50 select-none h-11"
          onClick={handleHeaderClick}
        >
          <Checkbox
            checked={group.items.every(i => checkedIds.has(i.id))}
            onChange={e => {
              e.stopPropagation();
              onCheck(group.items.map(i => i.id), e.target.checked);
            }}
          />
          <span className="icon icon-filled text-[18px] text-neutral-700">{group.icon}</span>
          <span className="flex-1 text-sm font-medium text-neutral-900 leading-snug">
            {group.label}
          </span>
          {liveNewCount > 0 && (
            <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">
              {liveNewCount} {liveNewCount === 1 ? 'Neu' : 'Neue'}
            </span>
          )}
          <span className="text-[12px] text-neutral-500 tabular-nums">{approvedCount}/{totalCount}</span>
          <button
            className="w-5 h-5 flex items-center justify-center text-neutral-800 hover:text-primary-500 transition-colors"
            onClick={e => { e.stopPropagation(); }}
            title="Hinzufügen"
          >
            <span className="icon text-[16px]">add</span>
          </button>
          <span className="icon text-[16px] text-neutral-800">
            {open ? 'expand_less' : 'expand_more'}
          </span>
        </div>

        {/* Items */}
        {open && (
          <ul>
            {group.items.map(item => {
              const active = item.id === selectedId;
              const slots  = supportingSlots[item.id] || [];
              const effectiveStatus = docStatusOverrides[item.id] ?? item.docStatus;
              const ignoredNotes = ignoredNotesByDoc[item.id] ?? null;
              const isApprovedWithNote = effectiveStatus === 'ok' && ignoredNotes && ignoredNotes.length > 0;
              // Has the advisor taken any action on this doc? Used to hide the "Neu" label after first interaction.
              const hasActionBeenTaken = (() => {
                if (effectiveStatus === 'ok' || effectiveStatus === 'rejected') return true;
                const dyn = dynamicChecksByDoc[item.id];
                const orig = QA_CHECKS[item.id];
                if (!dyn || !orig) return false;
                return orig.some(o => {
                  const cur = dyn.find(c => c.id === o.id);
                  if (!cur) return false;
                  if (cur.status !== o.status) return true;
                  if (cur.manualRelease) return true;
                  if (cur.requestNote) return true;
                  if (cur.notes && cur.notes.length > 0) return true;
                  return false;
                });
              })();
              return (
                <React.Fragment key={item.id}>
                  <li className="border-t border-neutral-100 first:border-t-0">
                    <button
                      onClick={() => onSelect(item.id)}
                      className={`w-full text-left flex items-center gap-2 pr-3 py-2 transition-colors
                        ${active
                          ? 'bg-primary-100 border-l-4 border-l-primary-500 pl-[38px]'
                          : 'pl-[42px] hover:bg-neutral-50'}`}
                    >
                      <Checkbox
                        checked={checkedIds.has(item.id)}
                        onChange={e => onCheck([item.id], e.target.checked)}
                      />
                      <DocStatusBadge docStatus={effectiveStatus} rejectedReasons={item.rejectedReasons || []} />
                      <span className={`flex-1 text-[13px] leading-snug text-left min-w-0
                        ${active ? 'text-primary-700 font-medium' : 'text-neutral-700'}`}>
                        {item.name}
                      </span>
                      {item.isNew && !hasActionBeenTaken && <NewBadge />}
                      {isApprovedWithNote
                        ? <SidebarIgnoreNoteIcon notes={ignoredNotes} />
                        : <WarningBadge docId={item.id} dynamicChecks={dynamicChecksByDoc[item.id] || []} />}
                    </button>
                  </li>
                  {/* Supporting slots — indented with dashed grey connector */}
                  {slots.map((slot, si) => {
                    const slotActive = slot.id === selectedId;
                    return (
                      <li key={slot.id} className="border-t border-neutral-100 relative">
                        {/* Vertical dashed line */}
                        <span className="absolute pointer-events-none"
                          style={{ left: 54, top: 0, bottom: si === slots.length - 1 ? '50%' : 0,
                            borderLeft: '2px dashed #616161' }} />
                        {/* Horizontal stub */}
                        <span className="absolute pointer-events-none"
                          style={{ left: 54, top: '50%', width: 14,
                            borderTop: '2px dashed #616161' }} />
                        <button
                          onClick={() => onSelect(slot.id)}
                          className={`w-full text-left flex items-center gap-2 pr-3 py-2 transition-colors
                            ${slotActive ? 'bg-neutral-100 border-l-4 pl-[66px]' : 'pl-[70px] hover:bg-neutral-50'}`}
                          style={slotActive ? { borderLeftColor: '#616161' } : {}}
                        >
                          <span className="w-[16px] h-[16px] rounded-full border-2 border-dashed border-neutral-400 bg-transparent flex-shrink-0" />
                          <span className="flex-1 text-[12px] italic text-neutral-700 leading-snug text-left min-w-0 truncate">
                            {slot.name}
                          </span>
                          <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-neutral-600 text-white whitespace-nowrap flex-shrink-0">
                            Angefordert
                          </span>
                        </button>
                      </li>
                    );
                  })}
                </React.Fragment>
              );
            })}
          </ul>
        )}
      </div>
    );
  }

  /* ── Sidebar ── */

    const [activeTab, setActiveTab] = React.useState('antragsunterlagen');

    const allIds = ALL_DOCS.map(d => d.id);

    function handleCheck(ids, checked) {
      setCheckedIds(prev => {
        const next = new Set(prev);
        ids.forEach(id => checked ? next.add(id) : next.delete(id));
        return next;

    const TABS = [

          {TABS.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`px-3 py-1.5 text-[12px] font-medium rounded-t transition-colors whitespace-nowrap

            <div className="w-5 h-5 rounded bg-primary-500 flex items-center justify-center flex-shrink-0">
              <span className="text-[10px] font-bold text-white leading-none">F</span>
            </div>
            <span className="text-[13px] font-medium">FinLink</span>
            <span className="icon text-[16px]">arrow_drop_down</span>
          </button>
          <div className="flex items-center gap-1.5">
            <button className="flex items-center gap-1 h-6 px-2 rounded-full bg-primary-500 text-white text-[11px] font-medium hover:bg-primary-600 transition-colors">
              <span className="icon text-[13px]">visibility</span>
              Sichtbar
            </button>

            <span className="icon text-[16px]">unfold_more</span>

        <div className="flex-1 min-h-0 overflow-y-auto flex flex-col gap-3 p-3 bg-[#ECEFF1]">

        </div>

    );

      { id:'308-1', name:'Innenfotos vorhanden',
        description:'Mindestens 2 Innenfotos erforderlich',
        status:'pass', result:'4 Innenfotos erkannt', override:null, remediation:null },
      { id:'308-2', name:'Außenfotos vorhanden',
        description:'Mindestens 2 Außenfotos erforderlich',
        status:'pass', result:'3 Außenfotos erkannt', override:null, remediation:null },
      { id:'308-3', name:'Bildqualität',
        description:'Fotos müssen in Farbe und ausreichend scharf sein',
        status:'pass', result:'Farbfotos, ausreichende Auflösung', override:null, remediation:null },
      { id:'308-4', name:'Aktualität',
        description:'Fotos dürfen nicht älter als 3 Monate sein',
        status:'pass', result:'Datum: 01.10.2025', override:null, remediation:null },
    ],
    302: [
      { id:'302-1', name:'Wohnfläche angegeben',    description:'Gesamtwohnfläche muss explizit angegeben sein',
        status:'pass',    result:'112 m² angegeben', override:null, remediation:null },
      { id:'302-2', name:'Raummaße vollständig',    description:'Länge und Breite je Raum müssen vorhanden sein',
        status:'fail',    result:'Maße für Raum 3 fehlen',

        status:'warning', result:'Stempel aber keine Unterschrift', override:null, remediation:null },

  const DEFAULT_QA_CHECKS = [
    { id:'def-1', name:'Dokument lesbar',     description:'Alle Seiten klar lesbar',
      status:'pending', result:'–', override:null, remediation:null },
    { id:'def-2', name:'Format korrekt',      description:'Dateiformat entspricht Anforderungen',
      status:'pending', result:'–', override:null, remediation:null },
    { id:'def-3', name:'Keine Manipulationen', description:'Keine sichtbaren Veränderungen',
      status:'pending', result:'–', override:null, remediation:null },
  ];

  /* ══════════════════════════════════════════════════════
     QA COMPONENTS
  ══════════════════════════════════════════════════════ */

  /* Status badge — coloured pill using Figma UI-Kit status tokens */
  function StatusBadge({ status, hasNote = false }) {
    const cfg = {
      pass:    { bg:'bg-qa-pass',    icon:'check',             label:'Bestanden'           },
      fail:    { bg:'bg-qa-fail',    icon:'cancel',            label:'Nicht erfüllt'       },
      ignored: { bg:'bg-qa-ignored', icon:'do_not_disturb_on', label: hasNote ? 'Ignoriert mit Notiz' : 'Ignoriert' },
      pending: { bg:'bg-qa-pending', icon:'hourglass_empty',   label:'Ausstehend'          },
    }[status];
    if (status === 'warning') return (
      <span className="flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap bg-qa-warn w-full">
        <WarnIcon size={13} color="white" />
        Warnung
      </span>
    );
    if (status === 'requested') return (
      <span className="flex items-center px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap w-full bg-neutral-600">
        Angefordert
      </span>
    );
    if (!cfg) return null;
    return (
      <span className={`flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap w-full ${cfg.bg}`}>
        <span className="icon icon-filled text-[13px]" style={{ lineHeight:1 }}>{cfg.icon}</span>
        {cfg.label}
      </span>
    );
  }

  /* Gray pen icon with hover tooltip showing ignore note + advisor + timestamp */
  function IgnoreNoteIcon({ override, onReset }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    const hasNote = !!(override?.note);
    const ts = override?.timestamp ? new Date(override.timestamp) : null;
    const dateStr = ts
      ? ts.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' })
        + ' · ' + ts.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })
      : '';
    return (
      <div className="flex items-center gap-2 flex-nowrap">
        <div ref={ref} className="relative cursor-default flex items-center"
          onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
          onMouseLeave={() => setAnchor(null)}>
          <span className={`icon icon-filled text-[18px] ${hasNote ? 'text-qa-ignored' : 'text-neutral-400'}`} style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>description</span>
          {hasNote ? (
            <Tooltip anchor={anchor}>
              <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-2 bg-neutral-50">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-neutral-500 text-white text-[10px] font-bold flex-shrink-0">
                  {override?.initials ?? '??'}
                </span>
                <div className="flex flex-col leading-tight">
                  <span className="text-[11px] font-medium text-neutral-700">{override?.advisorName ?? '–'}</span>
                  <span className="text-[10px] text-neutral-400">{dateStr}</span>
                </div>
              </div>
              <div className="px-3 py-2">
                <p className="text-[12px] text-neutral-700 leading-snug">{override?.note}</p>
              </div>
            </Tooltip>
          ) : (
            <Tooltip anchor={anchor}>
              <div className="px-3 py-2">
                <p className="text-[12px] text-neutral-500">Notiz hinzufügen</p>
              </div>
            </Tooltip>
          )}
        </div>
        <button onClick={onReset}
          className="inline-flex items-center gap-1 px-2 py-0.5 rounded-[4px] border border-[#b0bec5] text-[11px] font-medium text-[#4b5961] hover:bg-neutral-50 transition-colors whitespace-nowrap flex-shrink-0">
          <span className="icon text-[13px]" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20" }}>undo</span>
          Zurücksetzen
        </button>
      </div>
    );
  }

  /* Action cell — right column of check row */
  function ActionCell({ check, onRequestDoc, onIgnore, onReset }) {
    if (check.status === 'pass' || check.status === 'pending' || check.status === 'requested')
      return <span className="text-neutral-300 text-[13px]">—</span>;
    if (check.status === 'ignored')
      return <IgnoreNoteIcon override={check.override} onReset={onReset} />;
    /* warning or fail */
    return (
      <div className="flex items-center gap-1.5 flex-nowrap">
        {check.remediation?.type === 'request_document' && (
          <button onClick={onRequestDoc}
            className="inline-flex items-center gap-1 px-2 py-0.5 rounded-[4px] bg-primary-500 text-white text-[11px] font-medium hover:bg-primary-600 transition-colors whitespace-nowrap">
            <span className="icon text-[13px]" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20" }}>add_circle</span>
            {check.remediation.label}
          </button>
        )}
        <button onClick={onIgnore}
          className="inline-flex items-center gap-1 px-2 py-0.5 rounded border border-neutral-300 text-neutral-600 text-[11px] font-medium hover:bg-neutral-100 transition-colors whitespace-nowrap">
          <span className="icon text-[13px]" style={{ lineHeight:1 }}>do_not_disturb_on</span>
          Ignorieren
        </button>
      </div>
    );
  }

  /* Single check row */
  function QACheckRow({ check, onRequestDoc, onIgnore, onReset }) {
    const isPass = check.status === 'pass';
    const resultColor = { ignored:'text-neutral-400', pending:'text-neutral-400' }[check.status] || 'text-[#37474f]';
    return (
      <tr className="border-b border-neutral-100 last:border-0 hover:bg-neutral-50 transition-colors">
        <td className="px-3 py-1.5 align-middle whitespace-nowrap"><StatusBadge status={check.status} hasNote={!!(check.override?.note)} /></td>
        <td className="px-3 py-1.5 align-middle whitespace-nowrap">
          <span className="text-[12px] font-medium text-[#37474f]">{check.name}</span>
        </td>
        <td className="px-3 py-1.5 align-middle">
          {isPass
            ? <span className="icon icon-filled text-[15px] text-qa-pass" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 20" }}>check</span>
            : <span className={`text-[12px] ${resultColor}`}>{check.result}</span>
          }
        </td>
        <td className="px-3 py-1.5 align-middle whitespace-nowrap">
          <ActionCell check={check} onRequestDoc={onRequestDoc} onIgnore={onIgnore} onReset={onReset} />
        </td>
      </tr>
    );
  }

  /* Main QA panel */
  /* ── V2: orange chat icon with multi-note tooltip ── */
  function ChatNoteIcon({ notes }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    if (!notes || notes.length === 0) return null;
    return (
      <div ref={ref} className="flex items-center cursor-default flex-shrink-0"
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}>
        <span className="icon text-[20px] text-qa-warn" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20" }}>chat</span>
        <Tooltip anchor={anchor}>
          <NoteList notes={notes} />
        </Tooltip>
      </div>
    );
  }

  /* ── V3: inline highlighted token (e.g. "Begründung" / "Notiz") with hover popover ── */
  function InlineNoteToken({ label, note }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    if (!note || (!note.note && !note.reason)) return null;
    const normalized = {
      note: note.note ?? note.reason,
      advisorName: note.advisorName,
      initials: note.initials,
      timestamp: note.timestamp,
    };
    return (
      <span ref={ref}
        className="underline decoration-primary-500 underline-offset-2 text-primary-500 cursor-help font-medium"
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}>
        {label}
        <Tooltip anchor={anchor}>
          <NoteList notes={[normalized]} />
        </Tooltip>
      </span>
    );
  }

  /* Underlined "Notiz" token in Status cell — hover shows internal release note */
  function FreigabeNotizToken({ reason }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    if (!reason) return null;
    return (
      <span ref={ref}
        className="underline underline-offset-2 cursor-help font-medium text-[#37474f]"
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}>
        Notiz
        <Tooltip anchor={anchor}>
          <div className="px-3 py-2 border-b border-neutral-100 bg-neutral-50">
            <span className="text-[11px] font-semibold text-neutral-500 uppercase tracking-wider">Interne Notiz</span>
          </div>
          <div className="px-3 py-2.5">
            <p className="text-[12px] text-neutral-700 leading-snug">„{reason}"</p>
          </div>
        </Tooltip>
      </span>
    );
  }

  /* ── V5: 4-column QA row — Problem · Aktion · Status · Notiz für Kundendashboard ── */
  function QARow({ check, variant, isLast, showRightCell = true, onOpenRequestModal, onOpenManualReleaseModal, onOpenCustomerNoteModal, onResetCheck }) {
    const isError     = variant === 'error';
    const isWarn      = variant === 'warning';
    const isPass      = variant === 'pass';
    const isRequested = check.status === 'requested';
    const isReleased  = check.status === 'manually_released';
    const isResolved  = isRequested || isReleased;

    const text = isPass ? check.name : (check.result || check.name);
    const borderClass = isLast ? '' : 'border-b border-[#eceff1]';

    return (
      <React.Fragment>

        {/* Col 1 — Problem */}
        <div className={`flex items-center gap-2 px-3 min-h-10 py-2 bg-white ${borderClass}`}>
          {(isError || isWarn) && isResolved && (
            <span className="icon text-[18px] text-[#20bf6b] flex-shrink-0" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 700,'GRAD' 0,'opsz' 20" }}>check</span>
          )}
          {isError && !isResolved && (
            <span className="flex-shrink-0 inline-flex"><WarnIcon size={18} color="#FF5656" /></span>
          )}
          {isWarn && !isResolved && (
            <span className="flex-shrink-0 inline-flex"><WarnIcon size={18} /></span>
          )}
          {isPass && (
            <span className="icon text-[18px] text-[#20bf6b] flex-shrink-0" style={{ lineHeight:1, fontVariationSettings:"'FILL' 0,'wght' 700,'GRAD' 0,'opsz' 20" }}>check</span>
          )}
          <span className={`text-[12px] leading-[16px] tracking-[0.2px] break-words
            ${isResolved ? 'text-neutral-400 line-through' : isError ? 'text-[#e64d4d]' : 'text-[#4b5961]'}`}>
            {text}
          </span>
        </div>

        {/* Cols 2–4 only when showRightCell (hidden in Bestandene section) */}
        {showRightCell && (
          <>
            {/* Col 2 — Aktion */}
            <div className={`flex items-center gap-1.5 px-3 min-h-10 py-2 bg-white ${borderClass}`}>
              {!isPass && (
                isResolved ? (
                  <button onClick={() => onResetCheck(check.id)}
                    className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[12px] font-medium text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                    Zurücksetzen
                  </button>
                ) : (
                  <>
                    {check.remediation?.type === 'request_document' && (
                      <button onClick={() => onOpenRequestModal(check)}
                        className="h-6 px-2 rounded-[4px] bg-primary-500 text-white text-[12px] font-medium hover:bg-primary-600 transition-colors flex items-center whitespace-nowrap">
                        {check.remediation.label}
                      </button>
                    )}
                    {isError && (
                      <button onClick={() => onOpenManualReleaseModal(check)}
                        className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[12px] font-medium text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                        Manuell freigeben
                      </button>
                    )}
                    {isWarn && (
                      <button onClick={() => onOpenCustomerNoteModal(check)}
                        className="h-6 px-2 rounded-[4px] border border-[#b0bec5] bg-white text-[12px] font-medium text-[#4b5961] hover:bg-neutral-50 transition-colors flex items-center whitespace-nowrap">
                        Notiz schreiben
                      </button>
                    )}
                  </>
                )
              )}
            </div>

            {/* Col 3 — Status */}
            <div className={`flex items-center px-3 min-h-10 py-2 bg-white ${borderClass}`}>
              {isRequested && (
                <span className="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium text-white bg-neutral-600 whitespace-nowrap">
                  Angefordert
                </span>
              )}
              {isReleased && (
                <span className="text-[12px] text-[#37474f] whitespace-nowrap">
                  Freigegeben mit <FreigabeNotizToken reason={check.manualRelease?.reason} />
                </span>
              )}
            </div>

            {/* Col 4 — Notiz für Kundendashboard (customer-facing only) */}
            <div className={`flex items-start gap-2 px-3 min-h-10 py-2 bg-white ${borderClass}`}>
              {isRequested && check.requestNote?.note && (
                <>
                  <span className="icon text-[16px] text-neutral-400 flex-shrink-0 mt-[1px]" style={{ lineHeight:1 }}>email</span>
                  <span className="text-[12px] text-[#4b5961] leading-snug italic">„{check.requestNote.note}"</span>
                </>
              )}
            </div>
          </>
        )}
      </React.Fragment>
    );
  }

  /* ── Version tabs shown above QAPanel when advisor chose "Keep Both" ── */
  function VersionTabs({ versions, activeTab, onTabChange }) {
    return (
      <div className="flex items-center gap-1 px-3 pt-2 pb-0">
        {versions.map(v => (
          <button key={v.key}
            onClick={() => onTabChange(v.key)}
            className={`flex items-center gap-1.5 px-3 py-1.5 text-[12px] font-medium rounded-t transition-colors whitespace-nowrap border
              ${activeTab === v.key
                ? 'border-neutral-300 border-b-white bg-white text-neutral-900 -mb-px relative z-10'
                : 'border-transparent text-neutral-500 hover:text-neutral-700'}`}>
            {v.label}
            {v.isNew && (
              <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">Neu</span>
            )}
          </button>
        ))}
      </div>
    );
  }

  /* ── V5: unified Prüfungen panel — 4-column structured table ── */
  function QAPanel({ doc, checks, readOnly = false, onChecksUpdate, onOpenRequestModal, onOpenManualReleaseModal, onOpenCustomerNoteModal, onResetCheck, onRerun }) {
    const [isRunning, setIsRunning] = React.useState(false);
    const [expanded, setExpanded] = React.useState(true);
    const [bestandeneExpanded, setBestandeneExpanded] = React.useState(false);

    // Collapse the Bestandene sub-section whenever the doc changes
    React.useEffect(() => { setBestandeneExpanded(false); }, [doc?.id]);

    // Bucket each check: visible in main vs hidden in the "Bestandene" sub-section
    const visibleRows = [];
    const bestandeneRows = [];
    checks.forEach(c => {
      const orig = (QA_CHECKS[doc?.id] || []).find(x => x.id === c.id);
      const origStatus = orig?.status || c.status;
      const variant = origStatus === 'fail' ? 'error'
        : origStatus === 'warning' ? 'warning'
        : c.status === 'pass' ? 'pass'
        : null;
      if (!variant) return;
      const isResolved = c.status === 'manually_released' || c.status === 'requested';
      const stalePass  = c.status === 'pass' || (isResolved && !c.fresh);
      if (stalePass) bestandeneRows.push({ check: c, variant });
      else visibleRows.push({ check: c, variant });
    });

    const totalCount = visibleRows.length + bestandeneRows.length;
    const allPassed = visibleRows.length === 0 && bestandeneRows.length > 0;
    const hasActionable = visibleRows.some(r => r.variant === 'error' || r.variant === 'warning');
    // 4-column layout: Problem | Aktion | Status | Notiz für Kundendashboard
    const gridCols = hasActionable
      ? 'minmax(240px, 2fr) max-content max-content minmax(max-content, 220px)'
      : 'minmax(0, 1fr)';

    function handleRerun() {
      setIsRunning(true);
      setTimeout(() => { setIsRunning(false); onRerun(); }, 2000);
    }

    return (
      <div className="w-full">
        {/* Single unified Prüfungen card */}
        <div className="rounded-[8px] overflow-hidden border border-[#eaeaea] w-full">
          {/* Header — toggle on left, rerun action on right */}
          <div className={`flex items-center justify-between bg-white px-3 h-9 gap-6 ${expanded && (visibleRows.length > 0 || bestandeneRows.length > 0) ? 'border-b border-[#eceff1]' : ''}`}>
            <button onClick={() => setExpanded(x => !x)}
              className="flex items-center gap-2 hover:opacity-70 transition-opacity">
              <span className="text-[12px] font-medium text-[#37474f] leading-[20px]">Prüfungen</span>
              <span className={`icon text-[16px] text-[#37474f] transition-transform ${expanded ? '' : '-rotate-90'}`} style={{ lineHeight:1 }}>expand_more</span>
            </button>
            <button onClick={handleRerun} disabled={isRunning}
              className="flex items-center gap-1 py-[2px] text-[14px] font-medium text-primary-500 hover:text-primary-600 transition-colors disabled:opacity-60 whitespace-nowrap">
              <span className={`icon text-[16px] ${isRunning ? 'animate-spin' : ''}`} style={{ lineHeight:1 }}>
                {isRunning ? 'progress_activity' : 'sync'}
              </span>
              {isRunning ? 'Läuft …' : 'Prüfungen wiederholen'}
            </button>
          </div>

          {expanded && (
            <>
              {/* Main visible rows */}
              {visibleRows.length > 0 && (
                <div className="grid" style={{ gridTemplateColumns: gridCols }}>
                  {/* Table header — only when there are actionable rows */}
                  {hasActionable && !readOnly && (
                    <>
                      <div className="px-3 py-2 bg-neutral-50 border-b border-[#e0e0e0]">
                        <span className="text-[11px] font-normal text-neutral-500 uppercase tracking-wider">Problem</span>
                      </div>
                      <div className="px-3 py-2 bg-neutral-50 border-b border-[#e0e0e0]">
                        <span className="text-[11px] font-normal text-neutral-500 uppercase tracking-wider">Aktion</span>
                      </div>
                      <div className="px-3 py-2 bg-neutral-50 border-b border-[#e0e0e0]">
                        <span className="text-[11px] font-normal text-neutral-500 uppercase tracking-wider">Status</span>
                      </div>
                      <div className="px-3 py-2 bg-neutral-50 border-b border-[#e0e0e0]">
                        <span className="text-[11px] font-normal text-neutral-500 uppercase tracking-wider whitespace-nowrap">Notiz im Kundendashboard</span>
                      </div>
                    </>
                  )}
                  {visibleRows.map((row, i) => (
                    <QARow key={row.check.id} check={row.check} variant={row.variant}
                      isLast={i === visibleRows.length - 1 && bestandeneRows.length === 0}
                      showRightCell={hasActionable && !readOnly}
                      onOpenRequestModal={onOpenRequestModal}
                      onOpenManualReleaseModal={onOpenManualReleaseModal}
                      onOpenCustomerNoteModal={onOpenCustomerNoteModal}
                      onResetCheck={onResetCheck}
                    />
                  ))}
                </div>
              )}

              {/* Bestandene Prüfungen sub-section — collapsed by default */}
              {bestandeneRows.length > 0 && (
                <>
                  <button onClick={() => setBestandeneExpanded(x => !x)}
                    className={`w-full flex items-center justify-between bg-white px-3 h-9 hover:bg-neutral-50 transition-colors ${visibleRows.length > 0 ? 'border-t border-[#eceff1]' : ''} ${bestandeneExpanded ? 'border-b border-[#eceff1]' : ''}`}>
                    <div className="flex items-center gap-2">
                      <span className="text-[12px] font-medium text-[#37474f] leading-[20px]">Bestandene Prüfungen ({bestandeneRows.length})</span>
                      <span className={`icon text-[16px] text-[#37474f] transition-transform ${bestandeneExpanded ? '' : '-rotate-90'}`} style={{ lineHeight:1 }}>expand_more</span>
                    </div>
                  </button>

                  {bestandeneExpanded && (
                    <div className="grid" style={{ gridTemplateColumns: 'minmax(0, 1fr)' }}>
                      {bestandeneRows.map((row, i) => (
                        <QARow key={row.check.id} check={row.check} variant={row.variant}
                          isLast={i === bestandeneRows.length - 1}
                          showRightCell={false}
                        />
                      ))}
                    </div>
                  )}
                </>
              )}
            </>
          )}
        </div>
      </div>
    );
  }

  /* ── Request Supporting Document Modal ── */
  function RequestDocModal({ check, doc, onConfirm, onClose }) {
    const [note, setNote] = React.useState(check.remediation?.slotNote || '');
    const title = check.remediation?.label || 'Dokument anfordern';

    function handleConfirm() {
      onConfirm(check, note.trim());
    }
    return ReactDOM.createPortal(
      <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[200] p-4" onClick={onClose}>
        <div className="bg-white rounded-[8px] w-full max-w-[561px] overflow-hidden"
          style={{ boxShadow: '0px 4px 24px rgba(55,71,79,0.5)' }}
          onClick={e => e.stopPropagation()}>

          {/* Top separator */}
          <div className="h-px bg-[#eceff1]" />

          {/* Header */}
          <div className="bg-white rounded-tl-[8px] rounded-tr-[8px] pt-4">
            <div className="flex items-center justify-between px-6 mb-4">
              <div className="flex items-center gap-2 flex-1 min-w-0">
                <span className="text-[20px] font-medium text-[#37474f] leading-[24px]">{title}</span>

  function SubmissionModal({ docs, customerNotesByEntity, onJumpToDoc, onConfirm, onClose }) {
    // Collect per-doc data: only docs with Ambers OR customer notes show in the per-doc list
    const summary = docs.map(d => {
      const checks = QA_CHECKS[d.id] || [];
      const ambers = checks.filter(c => c.status === 'warning').map(c => c.result || c.name);
      const notes = (customerNotesByEntity[d.id] || []).map(n => n.note);
      return { doc: d, ambers, notes };
    });
    const docsWithDetails = summary.filter(s => s.ambers.length > 0 || s.notes.length > 0);
    const totalDocs = docs.length;
    const totalAmbers = summary.reduce((acc, s) => acc + s.ambers.length, 0);

  /* ── App ── */
  function App() {
