    const [docChecks, setDocChecks] = React.useState(() => {
      const init = {};
      ALL_DOCS.forEach(d => {
        init[d.id] = (QA_CHECKS[d.id] || DEFAULT_QA_CHECKS).map(c => ({ ...c }));
      });

      /* Seed past advisor actions (QA_CHECKS stays the untouched "automated flag" baseline):
         — Exposé (307): both failing checks resolved by requesting one fresh Exposé
         — Energieausweis (309): the expired-date check manually freigegeben */
      const expoRequestNote = {
        note: 'Das eingereichte Exposé ist unleserlich und älter als 3 Monate. Bitte laden Sie ein aktuelles, gut lesbares Exposé der Immobilie hoch.',
        advisorName: ADVISOR.name, initials: ADVISOR.initials, timestamp: '2026-05-28T10:15:00.000Z',
      };
      if (init[307]) init[307] = init[307].map(c =>
        (c.id === '307-1' || c.id === '307-2')
          ? { ...c, status: 'requested', requestNote: expoRequestNote, fresh: true }
          : c);
      if (init[309]) init[309] = init[309].map(c =>
        c.id === '309-1'
          ? { ...c, status: 'manually_released', fresh: true,
              manualRelease: {
                reason: 'Aktualisierter Energieausweis liegt der Bank bereits vor; Gültigkeit wurde manuell bestätigt.',
                advisorName: ADVISOR.name, initials: ADVISOR.initials, timestamp: '2026-05-28T10:15:00.000Z',
              } }
          : c);

      return init;
    });

    const [manualReleaseModal, setManualReleaseModal] = React.useState(null);
    const [requestModal, setRequestModal] = React.useState(null);
    const [noteModal, setNoteModal] = React.useState(null);
    const [customerNoteModal, setCustomerNoteModal] = React.useState(null);
    const [submissionModal, setSubmissionModal] = React.useState(false);

    /* Incoming document gate — keyed by doc id.
       Seeded: Exposé (307) client uploaded a replacement after the advisor requested one. */
    const [pendingNewVersions, setPendingNewVersions] = React.useState({
      307: {
        uploadDate: '2026-06-15T09:00:00.000Z',
        name: 'Exposé (Neue Version)',
        checks: [
          { id:'307-new-1', name:'Lesbarkeit', description:'Alle Seiten müssen klar lesbar sein',
            status:'pass', result:'Dokument gut lesbar', override:null, remediation:null },
          { id:'307-new-2', name:'Aktualität', description:'Exposé darf nicht älter als 3 Monate sein',
            status:'pass', result:'Datum: 12.06.2026', override:null, remediation:null },
        ]
      }
    });

    /* Version history — populated when advisor chooses "Beide behalten".
       old.checks is the frozen snapshot; live checks stay in docChecks. */
    const [documentVersionHistory, setDocumentVersionHistory] = React.useState({});

    /* Which doc's replace-or-keep modal is open */
    const [replaceOrKeepModal, setReplaceOrKeepModal] = React.useState(null);

    /* Toast with optional undo */
    const [toast, setToast] = React.useState({ visible: false, message: '', onUndo: null });
    const toastTimerRef = React.useRef(null);
    function showToast(msg, onUndo = null) {
      clearTimeout(toastTimerRef.current);
      setToast({ visible: true, message: msg, onUndo });
      toastTimerRef.current = setTimeout(() => setToast({ visible: false, message: '', onUndo: null }), 8000);
    }
    function dismissToast() {
      clearTimeout(toastTimerRef.current);
      setToast({ visible: false, message: '', onUndo: null });
    }

    /* Supporting slots — keyed by parent doc id.
       Seeded: Exposé (307) request produced one fresh-Exposé slot awaiting customer upload. */
    const [supportingSlots, setSupportingSlots] = React.useState({
      307: [{ id: 'slot-307-expose', name: 'Aktuelles Exposé (neu)', docStatus: 'pending',
        note: 'Das eingereichte Exposé ist unleserlich und älter als 3 Monate. Bitte laden Sie ein aktuelles, gut lesbares Exposé der Immobilie hoch.' }],
    });

    /* Doc status overrides — set when advisor manually approves a doc.
       Seeded: Energieausweis (309) is genehmigt after the expired-date check was manuell freigegeben. */
    const [docStatusOverrides, setDocStatusOverrides] = React.useState({ 309: 'ok' });

    /* Customer-facing notes — keyed by entity id (doc id or slot id).
       Seeded: mirror the Exposé request note onto the new slot and its parent doc
       (matches handleConfirmRequest) so the document-viewer toolbar popover shows it. */
    const [customerNotesByEntity, setCustomerNotesByEntity] = React.useState(() => {
      const expoNote = {
        id: 'cn-slot-307-expose',
        note: 'Das eingereichte Exposé ist unleserlich und älter als 3 Monate. Bitte laden Sie ein aktuelles, gut lesbares Exposé der Immobilie hoch.',
        advisorName: ADVISOR.name, initials: ADVISOR.initials, timestamp: '2026-05-28T10:15:00.000Z',
      };
      return { 'slot-307-expose': [expoNote], 307: [expoNote] };
    });

    function handleAddCustomerNote(entityId, noteText) {
      if (!entityId || !noteText?.trim()) return;
      const newNote = {
        id: `cn-${Date.now()}`,
        note: noteText.trim(),
        advisorName: ADVISOR.name,
        initials: ADVISOR.initials,
        timestamp: new Date().toISOString(),
      };
      setCustomerNotesByEntity(prev => ({
        ...prev,
        [entityId]: [newNote, ...(prev[entityId] || [])],
      }));
      showToast('Notiz für Kunde hinzugefügt');
    }
    function handleEditCustomerNote(entityId, noteId, newText) {
      if (!entityId || !noteId || !newText?.trim()) return;
      setCustomerNotesByEntity(prev => ({
        ...prev,
        [entityId]: (prev[entityId] || []).map(n => n.id === noteId
          ? { ...n, note: newText.trim(), timestamp: new Date().toISOString() }
          : n),
      }));
      showToast('Notiz aktualisiert');
    }
    function handleDeleteCustomerNote(entityId, noteId) {
      if (!entityId || !noteId) return;
      setCustomerNotesByEntity(prev => ({
        ...prev,
        [entityId]: (prev[entityId] || []).filter(n => n.id !== noteId),
      }));
      showToast('Notiz gelöscht');
    }

    function handleCustomerNoteModalConfirm(check, noteText) {
      if (!selectedDoc || !noteText?.trim()) return;
      handleAddCustomerNote(selectedDoc.id, noteText.trim());
      setCustomerNoteModal(null);
    }

    /* Aggregate every note across a doc's checks — newest first */
    const ignoredNotesByDoc = React.useMemo(() => {
      const result = {};
      Object.entries(docChecks).forEach(([docId, checks]) => {
        const allNotes = checks.flatMap(c => c.notes || []);
        if (allNotes.length > 0) {
          result[Number(docId)] = [...allNotes].sort(
            (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
          );
        }
      });
      return result;
    }, [docChecks]);

    function handleApproveDoc() {
      if (!selectedDoc) return;
      setDocStatusOverrides(prev => ({ ...prev, [selectedDoc.id]: 'ok' }));
      showToast('Dokument genehmigt');
    }

    const selectedDoc       = ALL_DOCS.find(d => d.id === selectedId) ?? null;
    const effectiveDocStatus = selectedDoc ? (docStatusOverrides[selectedDoc.id] ?? selectedDoc.docStatus) : null;
    const selectedSlot   = !selectedDoc ? Object.values(supportingSlots).flat().find(s => s.id === selectedId) ?? null : null;
    const activeDocNote  = selectedDoc?.note ?? null;
    const currentChecks  = selectedDoc && QA_CHECKS[selectedDoc.id] ? (docChecks[selectedDoc.id] || []) : [];

    /* No approve gate — the advisor can always approve a document, even when
       unresolved critical errors remain. Those errors are captured later in the
       summary report rather than blocking approval here. */
    const canApprove = !!selectedDoc;

    /* Submission gate — every real doc must be in effective status 'ok' */
    const submittableDocs = ALL_DOCS.filter(d => d.id !== 101);
    const canSubmit = submittableDocs.every(d => (docStatusOverrides[d.id] ?? d.docStatus) === 'ok');

    function handleOpenSubmission() { setSubmissionModal(true); }
    function handleSubmitToBank() {
      setSubmissionModal(false);
      showToast('✓ Antrag eingereicht — Bank prüft');
    }
    function handleJumpToDoc(docId) {
      setSelectedId(docId);
      setSubmissionModal(false);
    }

    function updateCheck(docId, checkId, updates) {
      setDocChecks(prev => ({
        ...prev,
        [docId]: prev[docId].map(c => c.id === checkId ? { ...c, ...updates } : c),
      }));
    }

    function handleConfirmRequest(check, note) {
      const docId = selectedDoc.id;
      const slotId = `slot-${Date.now()}`;
      const newSlot = { id: slotId, name: check.remediation.slotName || check.remediation.label, docStatus: 'pending', note: note || null };
      const origCheck = (QA_CHECKS[docId] || []).find(c => c.id === check.id);

      const requestNote = {
        note,
        advisorName: ADVISOR.name,
        initials: ADVISOR.initials,
        timestamp: new Date().toISOString(),
      };
      setSupportingSlots(prev => ({ ...prev, [docId]: [...(prev[docId] || []), newSlot] }));
      updateCheck(docId, check.id, { status: 'requested', requestNote, fresh: true });
      if (note) {
        const sharedNote = {
          id: `cn-${slotId}`,
          note,
          advisorName: ADVISOR.name,
          initials: ADVISOR.initials,
          timestamp: new Date().toISOString(),
        };
        // Mirror the note on both the new slot and its parent doc so the toolbar
        // popover shows the customer note in both contexts.
        setCustomerNotesByEntity(prev => ({
          ...prev,
          [slotId]: [sharedNote],
          [docId]: [sharedNote, ...(prev[docId] || [])],
        }));
      }
      setRequestModal(null);

      showToast(
        'Anfrage gesendet. Der Kunde sieht den Ablehnungsgrund und die nächsten Schritte in seinem Dashboard.',
        () => {
          setSupportingSlots(prev => ({ ...prev, [docId]: (prev[docId] || []).filter(s => s.id !== slotId) }));
          if (origCheck) updateCheck(docId, check.id, { ...origCheck });
        }
      );
    }

    function handleManualReleaseConfirm(check, reason) {
      const manualRelease = {
        reason,
        advisorName: ADVISOR.name,
        initials: ADVISOR.initials,
        timestamp: new Date().toISOString(),
      };
      setDocChecks(prev => {
        const docId = selectedDoc.id;
        return {
          ...prev,
          [docId]: prev[docId].map(c => c.id === check.id
            ? { ...c, status: 'manually_released', manualRelease, fresh: true }
            : c),
        };
      });
      setManualReleaseModal(null);
      showToast('Manuell freigegeben');
    }

    function handleAddNote(check, note) {
      const newNote = {
        note,
        advisorName: ADVISOR.name,
        initials: ADVISOR.initials,
        timestamp: new Date().toISOString(),
      };
      setDocChecks(prev => {
        const docId = selectedDoc.id;
        return {
          ...prev,
          [docId]: prev[docId].map(c => c.id === check.id
            ? { ...c, notes: [newNote, ...(c.notes || [])] }
            : c),
        };
      });
      setNoteModal(null);
      showToast('Notiz hinzugefügt');
    }

    function handleResetCheck(checkId) {
      const orig = (QA_CHECKS[selectedDoc?.id] || []).find(c => c.id === checkId);
      if (orig) updateCheck(selectedDoc.id, checkId, { ...orig, notes: [], manualRelease: null, requestNote: null, fresh: false });
    }

    function handleReplaceConfirm(docId) {
      const pending = pendingNewVersions[docId];
      if (!pending) return;
      setDocChecks(prev => ({
        ...prev,
        [docId]: pending.checks.map(c => ({ ...c, fresh: true })),
      }));
      setPendingNewVersions(prev => { const n = { ...prev }; delete n[docId]; return n; });
      setReplaceOrKeepModal(null);
      showToast('Dokument ersetzt – Prüfungen aktualisiert');
    }

    function handleKeepBothConfirm(docId) {
      const pending = pendingNewVersions[docId];
      if (!pending) return;
      const oldChecks = docChecks[docId] || [];
      const fmtDate = iso => new Date(iso).toLocaleDateString('de-DE', { day:'2-digit', month:'short.', year:'numeric' });
      // Snapshot old checks into version history; move new checks into live docChecks
      setDocumentVersionHistory(prev => ({
        ...prev,
        [docId]: {
          old: { checks: oldChecks, date: '2026-05-28T10:15:00.000Z', label: fmtDate('2026-05-28T10:15:00.000Z') },
          newLabel: fmtDate(pending.uploadDate),
          newDate: pending.uploadDate,
          activeTab: 'new',
        }
      }));
      setDocChecks(prev => ({
        ...prev,
        [docId]: pending.checks.map(c => ({ ...c, fresh: true })),
      }));
      setPendingNewVersions(prev => { const n = { ...prev }; delete n[docId]; return n; });
      setReplaceOrKeepModal(null);
      showToast('Beide Versionen gespeichert – Tabs verfügbar');
    }

    function handleVersionTabChange(docId, tab) {
      setDocumentVersionHistory(prev => ({
        ...prev,
        [docId]: { ...prev[docId], activeTab: tab }
      }));
    }

    function handleRerun() {
      // Move freshly resolved checks into the Bestandene section by clearing `fresh`
      setDocChecks(prev => {
        const next = {};
        Object.entries(prev).forEach(([docId, checks]) => {
          next[docId] = checks.map(c => c.fresh ? { ...c, fresh: false } : c);
        });
        return next;
      });
      showToast('✓ Prüfungen wurden aktualisiert');
    }

    return (
      <div className="h-screen flex flex-col overflow-hidden">
        <Header canSubmit={canSubmit} onOpenSubmission={handleOpenSubmission} />
        <div className="flex flex-1 overflow-hidden">
          <Sidebar
            selectedId={selectedId}
            onSelect={setSelectedId}
            supportingSlots={supportingSlots}
            docStatusOverrides={docStatusOverrides}
            ignoredNotesByDoc={ignoredNotesByDoc}
            dynamicChecksByDoc={docChecks}
          />
          <DocumentViewer
            doc={selectedDoc}
            slot={selectedSlot}
            docNote={activeDocNote}
            checks={currentChecks}
            activeEntityId={selectedSlot?.id ?? selectedDoc?.id ?? null}
            customerNotes={customerNotesByEntity[selectedSlot?.id ?? selectedDoc?.id] || []}
            pendingNewVersion={selectedDoc ? (pendingNewVersions[selectedDoc.id] ?? null) : null}
            versionHistory={selectedDoc ? (documentVersionHistory[selectedDoc.id] ?? null) : null}
            onShowReplaceOrKeep={() => selectedDoc && setReplaceOrKeepModal({ docId: selectedDoc.id })}
            onVersionTabChange={(tab) => selectedDoc && handleVersionTabChange(selectedDoc.id, tab)}
            onAddCustomerNote={handleAddCustomerNote}
            onEditCustomerNote={handleEditCustomerNote}
            onDeleteCustomerNote={handleDeleteCustomerNote}
            onOpenRequestModal={(check) => setRequestModal(check)}
            onOpenManualReleaseModal={(check) => setManualReleaseModal(check)}
            onOpenCustomerNoteModal={(check) => setCustomerNoteModal(check)}
            onOpenNoteModal={(check) => setNoteModal(check)}
            onChecksUpdate={(checkId, updates) => updateCheck(selectedDoc?.id, checkId, updates)}
            onResetCheck={handleResetCheck}
            onRerun={handleRerun}
            onApproveDoc={handleApproveDoc}
            effectiveDocStatus={effectiveDocStatus}
            canApprove={canApprove}
          />
          <PageRail doc={selectedDoc} />
        </div>

        {manualReleaseModal && (
          <ManualReleaseModal
            check={manualReleaseModal}
            onConfirm={handleManualReleaseConfirm}
            onClose={() => setManualReleaseModal(null)}
          />
        )}
        {requestModal && (
          <RequestDocModal
            check={requestModal}
            doc={selectedDoc}
            onConfirm={handleConfirmRequest}
            onClose={() => setRequestModal(null)}
          />
        )}
        {noteModal && (
          <NoteModal
            check={noteModal}
            onConfirm={handleAddNote}
            onClose={() => setNoteModal(null)}
          />
        )}
        {customerNoteModal && (
          <CustomerNoteModal
            check={customerNoteModal}
            onConfirm={handleCustomerNoteModalConfirm}
            onClose={() => setCustomerNoteModal(null)}
          />
        )}
        {replaceOrKeepModal && (
          <ReplaceOrKeepModal
            doc={ALL_DOCS.find(d => d.id === replaceOrKeepModal.docId)}
            pendingVersion={pendingNewVersions[replaceOrKeepModal.docId]}
            onReplace={() => handleReplaceConfirm(replaceOrKeepModal.docId)}
            onKeepBoth={() => handleKeepBothConfirm(replaceOrKeepModal.docId)}
            onClose={() => setReplaceOrKeepModal(null)}
          />
        )}
        {submissionModal && (
          <SubmissionModal
            docs={submittableDocs}
            customerNotesByEntity={customerNotesByEntity}
            onJumpToDoc={handleJumpToDoc}
            onConfirm={handleSubmitToBank}
            onClose={() => setSubmissionModal(false)}
          />
        )}
        <Toast message={toast.message} visible={toast.visible} onUndo={toast.onUndo} onDismiss={dismissToast} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
