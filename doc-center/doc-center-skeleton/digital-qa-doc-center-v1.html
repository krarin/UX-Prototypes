<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalQA Doc Center V1</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Roboto', 'sans-serif'] },
          colors: {
            primary: { 100: '#E6F5F3', 500: '#009688', 600: '#00877A', 700: '#00695c' },
            neutral: {
              50:  '#FAFAFA', 100: '#F5F5F5', 200: '#EEEEEE', 300: '#E0E0E0',
              400: '#BDBDBD', 500: '#9E9E9E', 600: '#757575', 700: '#616161',
              800: '#424242', 900: '#212121',
            },
            /* QA status — from Figma UI-Kit tokens */
            'qa-pass':           '#20BF6B',
            'qa-pass-light':     '#E9FCF2',
            'qa-warn':           '#FF9F1A',
            'qa-warn-light':     '#FFF5E8',
            'qa-fail':           '#FF5656',
            'qa-fail-light':     '#FFEEEE',
            'qa-ignored':        '#4B7BEC',
            'qa-ignored-light':  '#EBF0FB',
            'qa-pending':        '#78909C',
            'qa-pending-light':  '#ECEFF1',
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'Roboto', sans-serif; }
    .icon {
      font-family: 'Material Symbols Outlined'; font-style: normal;
      font-size: 20px; line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      user-select: none;
    }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

  /* ── Data ── */
  const GROUPS = [
    {
      id: 'unkategorisiert',
      label: 'Unkategorisiert',
      icon: 'folder_open',
      items: [
        { id: 101, name: 'Unkategorisierte Seiten', docStatus: 'pending' },
      ]
    },
    {
      id: 'persoenlich',
      label: 'Persönliche Dokumente',
      icon: 'person',
      newCount: 2,
      items: [
        { id: 201, name: 'Gehaltsabrechnung August',    docStatus: 'pending', isNew: true,
          warnings: ['IBAN fehlt auf der Gehaltsabrechnung', 'Digital signiert – bitte in Tinte unterschreiben'] },
        { id: 202, name: 'Gehaltsabrechnung September', docStatus: 'ok', isNew: true },
        { id: 203, name: 'Personalausweis',             docStatus: 'ok' },
        { id: 204, name: 'Kontoauszug Oktober',         docStatus: 'pending' },
      ]
    },
    {
      id: 'immobilien',
      label: 'Immobilienunterlagen',
      icon: 'home',
      items: [
        { id: 301, name: 'Vollständiger aktueller Grundbuchauszug (max. 3 Monate alt)', docStatus: 'ok' },
        { id: 302, name: 'Wohnflächenberechnung (mit Angabe von Länge und Breite je Raum)', docStatus: 'ok',
          warnings: ['Maße bei Raum 3 fehlen', 'Stempel des Architekten fehlt'] },
        { id: 303, name: 'Aktuelle Flurkarte/Lageplan',  docStatus: 'ok' },
        { id: 304, name: 'Baubeschreibung',              docStatus: 'pending' },
        { id: 305, name: 'Kaufvertragsentwurf',          docStatus: 'ok' },
        { id: 306, name: 'Bemaßte Baupläne (evtl. fehlende Maßangaben bitte zwingend ergänzen)', docStatus: 'ok' },
        { id: 307, name: 'Exposé',                       docStatus: 'rejected',
          rejectedReasons: ['Dokument unleserlich – bitte erneut scannen', 'Exposé veraltet (älter als 3 Monate)'] },
        { id: 308, name: 'Aktuelle Objektfotos in Farbe von Innen und Außen (je mind. 2)', docStatus: 'ok' },
        { id: 309, name: 'Energieausweis', docStatus: 'rejected',
          rejectedReasons: ['Gültigkeitsdatum abgelaufen – automatisch abgelehnt'] },
      ]
    }
  ];

  /* all items flattened for viewer lookup */
  const ALL_DOCS = GROUPS.flatMap(g => g.items);

  /* ── Sub-components ── */

  /* Orange triangle warning icon with "?" — matches Figma node 29:80326 */
  function WarnIcon({ size = 16, className = '' }) {
    return (
      <svg width={size} height={size} viewBox="0 0 20 20" fill="none" className={className} style={{ flexShrink: 0, display: 'inline-block' }}>
        <path d="M9.13 3.2L1.2 16.8A1 1 0 0 0 2.07 18.3H17.93A1 1 0 0 0 18.8 16.8L10.87 3.2A1 1 0 0 0 9.13 3.2Z" fill="#FF9F1A"/>
        <text x="10" y="15.5" textAnchor="middle" fill="white" fontSize="8" fontWeight="700" fontFamily="Roboto, sans-serif">!</text>
      </svg>
    );
  }

  /* ── Tooltip (portal, bypasses overflow clipping) ── */
  function Tooltip({ anchor, children }) {
    if (!anchor) return null;
    const TIP_W = 248;
    const GAP   = 6;
    const PAD   = 8;

    // Center on anchor, then clamp so neither edge leaves the viewport
    const rawLeft = anchor.left + anchor.width / 2 - TIP_W / 2;
    const left = Math.max(PAD, Math.min(rawLeft, window.innerWidth - TIP_W - PAD));

    // Prefer above; fall back to below when near the top of the screen
    const above = anchor.top > 180;
    const vertical = above
      ? { bottom: window.innerHeight - anchor.top + GAP }
      : { top: anchor.bottom + GAP };

    const style = {
      position: 'fixed',
      zIndex: 9999,
      left,
      width: TIP_W,
      ...vertical,
      pointerEvents: 'none',
    };
    return ReactDOM.createPortal(
      <div style={style} className="bg-white border border-neutral-200 rounded-lg shadow-lg overflow-hidden text-left">
        {children}
      </div>,
      document.body
    );
  }

  /* ── DocStatusBadge — left of document name ── */
  function DocStatusBadge({ docStatus, rejectedReasons = [] }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);

    function StatusIcon() {
      if (docStatus === 'ok')
        return <span className="icon icon-filled text-[18px] text-green-500 leading-none">check_circle</span>;
      if (docStatus === 'rejected')
        return <span className="icon icon-filled text-[18px] text-red-500 leading-none">cancel</span>;
      /* pending — filled circle with white hourglass */
      return (
        <span className="w-[18px] h-[18px] rounded-full bg-neutral-400 inline-flex items-center justify-center flex-shrink-0 overflow-hidden">
          <span className="icon text-[11px] text-white" style={{ fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20", lineHeight: 1, display: 'block' }}>hourglass_empty</span>
        </span>
      );
    }

    const labels = { ok: 'Genehmigt', pending: 'Ausstehend', rejected: 'Abgelehnt' };

    return (
      <div
        ref={ref}
        className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}
      >
        <StatusIcon />
        <Tooltip anchor={anchor}>
          {docStatus === 'rejected' ? (
            <>
              <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-1.5 bg-red-50">
                <span className="icon icon-filled text-[14px] text-red-500">cancel</span>
                <span className="text-[11px] font-medium text-red-600 uppercase tracking-wide">Abgelehnt</span>
              </div>
              {rejectedReasons.length > 0 && (
                <ul className="px-3 py-2.5 flex flex-col gap-1.5">
                  {rejectedReasons.map((r, i) => (
                    <li key={i} className="flex items-start gap-2 text-[12px] text-neutral-700 leading-snug">
                      <span className="mt-[5px] w-1.5 h-1.5 rounded-full bg-red-400 flex-shrink-0" />
                      {r}
                    </li>
                  ))}
                </ul>
              )}
            </>
          ) : (
            <div className="px-3 py-2.5 flex items-center gap-2">
              <StatusIcon />
              <span className="text-[12px] text-neutral-700 font-medium">{labels[docStatus] || 'Ausstehend'}</span>
            </div>
          )}
        </Tooltip>
      </div>
    );
  }

  /* ── WarningBadge — right side exclamation ── */
  function WarningBadge({ warnings }) {
    const [anchor, setAnchor] = React.useState(null);
    const ref = React.useRef(null);
    if (!warnings || warnings.length === 0) return null;
    return (
      <div
        ref={ref}
        className="flex-shrink-0 flex items-center"
        onClick={e => e.stopPropagation()}
        onMouseEnter={() => setAnchor(ref.current?.getBoundingClientRect())}
        onMouseLeave={() => setAnchor(null)}
      >
        <WarnIcon size={18} />
        <Tooltip anchor={anchor}>
          <div className="px-3 py-2 border-b border-neutral-100 flex items-center gap-1.5 bg-amber-50">
            <WarnIcon size={14} />
            <span className="text-[11px] font-medium text-amber-600 uppercase tracking-wide">
              {warnings.length} {warnings.length === 1 ? 'Hinweis' : 'Hinweise'}
            </span>
          </div>
          <ul className="px-3 py-2.5 flex flex-col gap-1.5">
            {warnings.map((w, i) => (
              <li key={i} className="flex items-start gap-2 text-[12px] text-neutral-700 leading-snug">
                <span className="mt-[5px] w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0" />
                {w}
              </li>
            ))}
          </ul>
        </Tooltip>
      </div>
    );
  }

  function NewBadge() {
    return (
      <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">
        Neu
      </span>
    );
  }

  function Checkbox({ checked, onChange }) {
    return (
      <input
        type="checkbox"
        checked={checked}
        onChange={onChange}
        onClick={e => e.stopPropagation()}
        className="w-4 h-4 rounded-md border-neutral-300 accent-[#78909C] flex-shrink-0 cursor-pointer"
      />
    );
  }

  function CategoryGroup({ group, selectedId, onSelect, checkedIds, onCheck, supportingSlots = {} }) {
    const [open, setOpen] = React.useState(true);
    const approvedCount = group.items.filter(i => i.docStatus === 'ok').length;
    const totalCount = group.items.length;

    return (
      <div className="bg-white rounded-lg border border-neutral-200 overflow-hidden">
        {/* Category header */}
        <div
          className="flex items-center gap-2 px-4 cursor-pointer bg-white hover:bg-neutral-50 select-none h-11"
          onClick={() => setOpen(o => !o)}
        >
          <Checkbox
            checked={group.items.every(i => checkedIds.has(i.id))}
            onChange={e => {
              e.stopPropagation();
              onCheck(group.items.map(i => i.id), e.target.checked);
            }}
          />
          <span className="icon icon-filled text-[18px] text-neutral-700">{group.icon}</span>
          <span className="flex-1 text-sm font-medium text-neutral-900 leading-snug">
            {group.label}
          </span>
          {group.newCount > 0 && (
            <span className="px-1.5 py-0.5 rounded text-[10px] font-medium bg-primary-500 text-white leading-none">
              {group.newCount} Neue
            </span>
          )}
          <span className="text-[12px] text-neutral-500 tabular-nums">{approvedCount}/{totalCount}</span>
          <button
            className="w-5 h-5 flex items-center justify-center text-neutral-800 hover:text-primary-500 transition-colors"
            onClick={e => { e.stopPropagation(); }}
            title="Hinzufügen"
          >
            <span className="icon text-[16px]">add</span>
          </button>
          <span className="icon text-[16px] text-neutral-800">
            {open ? 'expand_less' : 'expand_more'}
          </span>
        </div>

        {/* Items */}
        {open && (
          <ul>
            {group.items.map(item => {
              const active = item.id === selectedId;
              const slots  = supportingSlots[item.id] || [];
              return (
                <React.Fragment key={item.id}>
                  <li className="border-t border-neutral-100 first:border-t-0">
                    <button
                      onClick={() => onSelect(item.id)}
                      className={`w-full text-left flex items-center gap-2 pr-3 py-2 transition-colors
                        ${active
                          ? 'bg-primary-100 border-l-4 border-l-primary-500 pl-[20px]'
                          : 'pl-[24px] hover:bg-neutral-50'}`}
                    >
                      <Checkbox
                        checked={checkedIds.has(item.id)}
                        onChange={e => onCheck([item.id], e.target.checked)}
                      />
                      <DocStatusBadge docStatus={item.docStatus} rejectedReasons={item.rejectedReasons || []} />
                      <span className={`flex-1 text-[13px] leading-snug text-left min-w-0
                        ${active ? 'text-primary-700 font-medium' : 'text-neutral-700'}`}>
                        {item.name}
                      </span>
                      {item.isNew && <NewBadge />}
                      <WarningBadge warnings={item.warnings} />
                    </button>
                  </li>
                  {/* Supporting slots — indented with dashed amber connector */}
                  {slots.map((slot, si) => {
                    const slotActive = slot.id === selectedId;
                    return (
                      <li key={slot.id} className="border-t border-neutral-100 relative">
                        {/* Vertical dashed line */}
                        <span className="absolute pointer-events-none"
                          style={{ left: 36, top: 0, bottom: si === slots.length - 1 ? '50%' : 0,
                            borderLeft: '2px dashed #FF9F1A' }} />
                        {/* Horizontal stub */}
                        <span className="absolute pointer-events-none"
                          style={{ left: 36, top: '50%', width: 14,
                            borderTop: '2px dashed #FF9F1A' }} />
                        <button
                          onClick={() => onSelect(slot.id)}
                          className={`w-full text-left flex items-center gap-2 pr-3 py-2 transition-colors
                            ${slotActive ? 'bg-qa-warn-light border-l-4 pl-[48px]' : 'pl-[52px] hover:bg-neutral-50'}`}
                          style={slotActive ? { borderLeftColor: '#FF9F1A' } : {}}
                        >
                          <span className="w-[16px] h-[16px] rounded-full bg-neutral-300 inline-flex items-center justify-center flex-shrink-0 overflow-hidden">
                            <span className="icon text-[10px] text-white" style={{ fontVariationSettings:"'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20", lineHeight:1, display:'block' }}>hourglass_empty</span>
                          </span>
                          <span className="flex-1 text-[12px] italic text-qa-warn leading-snug text-left min-w-0 truncate">
                            {slot.name}
                          </span>
                          <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-qa-warn-light text-qa-warn border border-qa-warn whitespace-nowrap flex-shrink-0">
                            Angefordert
                          </span>
                        </button>
                      </li>
                    );
                  })}
                </React.Fragment>
              );
            })}
          </ul>
        )}
      </div>
    );
  }

  /* ── Sidebar ── */
  function Sidebar({ selectedId, onSelect, supportingSlots = {} }) {
    const [activeTab, setActiveTab] = React.useState('antragsunterlagen');
    const [checkedIds, setCheckedIds] = React.useState(new Set());

    const allIds = ALL_DOCS.map(d => d.id);
    const allChecked = allIds.every(id => checkedIds.has(id));

    function handleCheck(ids, checked) {
      setCheckedIds(prev => {
        const next = new Set(prev);
        ids.forEach(id => checked ? next.add(id) : next.delete(id));
        return next;
      });
    }

    const TABS = [
      { id: 'antragsunterlagen', label: 'Antragsunterlagen' },
      { id: 'vertragsunterlagen', label: 'Vertragsunterlagen' },
    ];

    return (
      <aside className="w-[400px] flex-shrink-0 flex flex-col bg-white border-r border-neutral-200 overflow-hidden">

        {/* ── Tab bar ── */}
        <div className="flex items-center border-b border-neutral-200 px-2 pt-2 gap-1">
          {TABS.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              className={`px-3 py-1.5 text-[12px] font-medium rounded-t transition-colors whitespace-nowrap
                ${activeTab === tab.id
                  ? 'border border-neutral-300 border-b-white bg-white text-neutral-900 -mb-px z-10 relative'
                  : 'text-neutral-500 hover:text-neutral-700'}`}
            >
              {tab.label}
            </button>
          ))}
          <button className="ml-auto mb-2 w-6 h-6 flex items-center justify-center text-neutral-400 hover:text-neutral-600">
            <span className="icon text-[16px]">chevron_right</span>
          </button>
        </div>

        {/* ── Source bar ── */}
        <div className="flex items-center justify-between px-3 py-2 border-b border-neutral-200">
          <button className="flex items-center gap-1.5 text-primary-600 hover:text-primary-700 transition-colors">
            <div className="w-5 h-5 rounded bg-primary-500 flex items-center justify-center flex-shrink-0">
              <span className="text-[10px] font-bold text-white leading-none">F</span>
            </div>
            <span className="text-[13px] font-medium">FinLink</span>
            <span className="icon text-[16px]">arrow_drop_down</span>
          </button>
          <div className="flex items-center gap-1.5">
            <button className="flex items-center gap-1 h-6 px-2 rounded-full bg-primary-500 text-white text-[11px] font-medium hover:bg-primary-600 transition-colors">
              <span className="icon text-[13px]">visibility</span>
              Sichtbar
            </button>
            <button className="w-6 h-6 flex items-center justify-center text-neutral-400 hover:text-neutral-600 rounded hover:bg-neutral-100">
              <span className="icon text-[18px]">more_horiz</span>
            </button>
          </div>
        </div>

        {/* ── Select all ── */}
        <div className="flex items-center gap-2 px-3 py-2 border-b border-neutral-200">
          <Checkbox
            checked={allChecked}
            onChange={e => handleCheck(allIds, e.target.checked)}
          />
          <span className="flex-1 text-[13px] text-neutral-600">Alle auswählen</span>
          <button className="w-5 h-5 flex items-center justify-center text-neutral-400 hover:text-neutral-600">
            <span className="icon text-[16px]">unfold_more</span>
          </button>
        </div>

        {/* ── Document groups ── */}
        <div className="flex-1 overflow-y-auto flex flex-col gap-3 p-3 bg-[#ECEFF1]">
          {GROUPS.map(group => (
            <CategoryGroup
              key={group.id}
              group={group}
              selectedId={selectedId}
              onSelect={onSelect}
              checkedIds={checkedIds}
              onCheck={handleCheck}
              supportingSlots={supportingSlots}
            />
          ))}
        </div>

        {/* ── Footer ── */}
        <div className="border-t border-neutral-200 px-3 py-2.5 flex flex-col gap-1">
          <button className="flex items-center gap-1 text-primary-600 hover:text-primary-700 text-[13px] font-medium transition-colors">
            <span className="icon text-[16px]">add</span>
            Weitere Dokumente anfordern
          </button>
          <p className="text-[10px] text-neutral-400 leading-tight">
            FE: main@c297573658 | BE: main@c297573658
          </p>
        </div>

      </aside>
    );
  }

  /* ══════════════════════════════════════════════════════
     QA DATA MODEL  (status: pass | warning | fail | ignored | pending)
  ══════════════════════════════════════════════════════ */
  const QA_CHECKS = {
    201: [
      { id:'201-1', name:'IBAN auf Dokument',       description:'IBAN muss im Dokument vorhanden sein',
        status:'fail',    result:'IBAN nicht gefunden',
        override:null, remediation:{ type:'request_document', documentType:'bank_statement', label:'Kontoauszug anfordern' } },
      { id:'201-2', name:'Name stimmt überein',     description:'Kundenname muss auf dem Dokument lesbar sein',
        status:'pass',    result:'Melissa Mustermann gefunden', override:null, remediation:null },
      { id:'201-3', name:'Datum im gültigen Bereich', description:'Nicht älter als 3 Monate',
        status:'pass',    result:'Datum: 15.08.2025', override:null, remediation:null },

      { id:'201-5', name:'Dokument lesbar',         description:'Alle Seiten müssen klar lesbar sein',

    ],
    202: [
      { id:'202-1', name:'Arbeitgebername',         description:'Name des Arbeitgebers muss angegeben sein',
        status:'fail',    result:'Arbeitgebername fehlt',

      { id:'202-2', name:'Name stimmt überein',     description:'Kundenname muss auf dem Dokument lesbar sein',
        status:'pass',    result:'Melissa Mustermann gefunden', override:null, remediation:null },
      { id:'202-3', name:'Betrag plausibel',        description:'Bruttogehalt im plausiblen Bereich',
        status:'pass',    result:'€ 4.250,00 – plausibel', override:null, remediation:null },
      { id:'202-4', name:'Datum im gültigen Bereich', description:'Nicht älter als 3 Monate',
        status:'pass',    result:'Datum: 15.09.2025', override:null, remediation:null },
    ],
    203: [
      { id:'203-1', name:'Name stimmt überein',     description:'Name muss mit Antragsdaten übereinstimmen',
        status:'pass',    result:'Melissa Mustermann bestätigt', override:null, remediation:null },
      { id:'203-2', name:'Ausweis nicht abgelaufen', description:'Gültigkeitsdatum muss in der Zukunft liegen',
        status:'pass',    result:'Gültig bis 12.2029', override:null, remediation:null },
      { id:'203-3', name:'Lichtbild vorhanden',     description:'Lichtbild muss erkennbar sein',
        status:'pass',    result:'Lichtbild erkannt', override:null, remediation:null },

    ],
    204: [
      { id:'204-1', name:'IBAN stimmt überein',     description:'IBAN muss mit Antragsdaten übereinstimmen',
        status:'pass',    result:'DE89 3704 0044 xxxx – stimmt überein', override:null, remediation:null },
      { id:'204-2', name:'Datum im gültigen Bereich', description:'Nicht älter als 3 Monate',

      { id:'204-3', name:'Kontoinhaber verifiziert', description:'Kontoinhaber muss mit Antragsteller übereinstimmen',

      { id:'204-4', name:'Keine Manipulationen',    description:'Keine sichtbaren Veränderungen',
        status:'pass',    result:'Keine Manipulationen erkannt', override:null, remediation:null },

  /* Status badge — coloured pill using Figma UI-Kit status tokens */
  function StatusBadge({ status }) {
    const cfg = {
      pass:    { bg:'bg-qa-pass',    icon:'check',             label:'Bestanden'      },
      fail:    { bg:'bg-qa-fail',    icon:'cancel',            label:'Fehlgeschlagen' },
      ignored: { bg:'bg-qa-ignored', icon:'do_not_disturb_on', label:'Ignoriert'      },
      pending: { bg:'bg-qa-pending', icon:'hourglass_empty',   label:'Ausstehend'     },
    }[status];
    if (status === 'warning') return (
      <span className="flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap bg-qa-warn w-full">
        <WarnIcon size={13} />
        Warnung
      </span>
    );
    if (!cfg) return null;
    return (
      <span className={`flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium text-white whitespace-nowrap w-full ${cfg.bg}`}>
        <span className="icon icon-filled text-[13px]" style={{ lineHeight:1 }}>{cfg.icon}</span>
        {cfg.label}
      </span>
    );
  }

  /* Action cell — right column of check row */
  function ActionCell({ check, onRequestDoc, onIgnore, onReset }) {
    if (check.status === 'pass')
      return <span className="text-neutral-300 text-[13px]">—</span>;
    if (check.status === 'pending')
      return check.slotCreated
        ? <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium bg-qa-warn text-white whitespace-nowrap">
            <span className="icon text-[13px]" style={{ lineHeight:1 }}>link</span>Angefordert
          </span>
        : <span className="text-neutral-300 text-[13px]">—</span>;
    if (check.status === 'ignored')
      return (
        <div className="flex items-center gap-2 flex-nowrap overflow-hidden">
          <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium bg-qa-ignored text-white min-w-0">
            <span className="icon icon-filled text-[12px]" style={{ lineHeight:1 }}>chat</span>
            <span className="truncate max-w-[120px]">{check.override?.note}</span>
          </span>
          <button onClick={onReset} className="text-[11px] text-neutral-500 hover:text-neutral-800 underline transition-colors whitespace-nowrap flex-shrink-0">
            Zurücksetzen
          </button>
        </div>
      );
    /* warning or fail */
    return (
      <div className="flex items-center gap-1.5 flex-nowrap">
        {check.remediation?.type === 'request_document' && (
          <button onClick={onRequestDoc}
            className="inline-flex items-center gap-1 px-2 py-0.5 rounded border border-primary-500 text-primary-600 text-[11px] font-medium hover:bg-primary-100 transition-colors whitespace-nowrap">
            <span className="icon text-[13px]" style={{ lineHeight:1 }}>add_circle</span>
            {check.remediation.label}
          </button>
        )}
        <button onClick={onIgnore}
          className="inline-flex items-center gap-1 px-2 py-0.5 rounded border border-neutral-300 text-neutral-600 text-[11px] font-medium hover:bg-neutral-100 transition-colors whitespace-nowrap">
          <span className="icon text-[13px]" style={{ lineHeight:1 }}>do_not_disturb_on</span>
          Ignorieren
        </button>
      </div>
    );
  }

  /* Single check row */
  function QACheckRow({ check, onRequestDoc, onIgnore, onReset }) {
    const isPass = check.status === 'pass';
    const resultColor = { warning:'text-qa-warn', fail:'text-qa-fail', ignored:'text-neutral-400', pending:'text-neutral-400' }[check.status] || 'text-neutral-600';
    return (
      <tr className="border-b border-neutral-100 last:border-0 hover:bg-neutral-50 transition-colors">
        <td className="px-3 py-1.5 align-middle whitespace-nowrap"><StatusBadge status={check.status} /></td>
        <td className="px-3 py-1.5 align-middle whitespace-nowrap">
          <div className="flex flex-col">
            <span className="text-[12px] font-medium text-[#37474f] leading-snug">{check.name}</span>
            <span className="text-[11px] text-neutral-400 leading-snug">{check.description}</span>
          </div>
        </td>
        <td className="px-3 py-1.5 align-middle">
          {isPass
            ? <span className="icon icon-filled text-[15px] text-qa-pass" style={{ lineHeight:1, fontVariationSettings:"'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 20" }}>check</span>
            : <span className={`text-[12px] ${resultColor}`}>{check.result}</span>
          }
        </td>
        <td className="px-3 py-1.5 align-middle whitespace-nowrap">
          <ActionCell check={check} onRequestDoc={onRequestDoc} onIgnore={onIgnore} onReset={onReset} />
        </td>
      </tr>
    );
  }

  /* Main QA panel */
  function QAPanel({ doc, checks, onChecksUpdate, onOpenRequestModal, onOpenIgnoreModal, onResetCheck, onRerun }) {
    const [isRunning, setIsRunning] = React.useState(false);
    const [passExpanded, setPassExpanded] = React.useState(false);

    const passCount     = checks.filter(c => c.status === 'pass').length;
    const totalCount    = checks.filter(c => c.status !== 'ignored').length;
    const warnFailCount = checks.filter(c => c.status === 'warning' || c.status === 'fail').length;

    const activeChecks = checks.filter(c => c.status !== 'pass');
    const passChecks   = checks.filter(c => c.status === 'pass');

    function handleRerun() {
      setIsRunning(true);
      setTimeout(() => { setIsRunning(false); onRerun(); }, 2000);
    }

    function renderRow(check) {
      return (
        <QACheckRow key={check.id} check={check}
          onRequestDoc={() => onOpenRequestModal(check, doc)}
          onIgnore={() => onOpenIgnoreModal(check)}
          onReset={() => onResetCheck(check.id)}
        />
      );
    }

    return (
      <div className="bg-white rounded-lg border border-neutral-200 overflow-hidden">
        {/* Panel header */}
        <div className="flex items-center gap-3 px-4 border-b border-neutral-200" style={{ minHeight: '44px' }}>
          <div className="flex items-center gap-1.5 self-stretch py-2.5">
            <span className="icon text-[16px] text-primary-500">fact_check</span>
            <span className="text-[13px] font-medium text-[#37474f]">Prüfungen</span>
          </div>
          <div className="flex-1" />
          <button onClick={handleRerun} disabled={isRunning}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded text-[12px] font-medium bg-primary-500 text-white hover:bg-primary-600 disabled:opacity-60 disabled:cursor-not-allowed transition-colors whitespace-nowrap">
            <span className={`icon text-[15px] ${isRunning ? 'animate-spin' : ''}`}>
              {isRunning ? 'progress_activity' : 'refresh'}
            </span>
            {isRunning ? 'Läuft …' : 'Prüfungen wiederholen'}
          </button>
        </div>
        {/* Checks table */}
        <div className="overflow-y-auto" style={{ maxHeight: '320px' }}>
          <table className="w-full text-left border-collapse">
            <thead className="sticky top-0 z-10">
              <tr className="bg-neutral-50 border-b border-neutral-200">
                <th className="px-3 py-1.5 text-[10px] font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">Status</th>
                <th className="px-3 py-1.5 text-[10px] font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">Prüfung</th>
                <th className="px-3 py-1.5 text-[10px] font-medium text-neutral-500 uppercase tracking-wider w-full">Ergebnis</th>
                <th className="px-3 py-1.5 text-[10px] font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">Aktionen</th>
              </tr>
            </thead>
            <tbody>
              {/* Active checks (fail / warning / ignored / pending) — expanded by default */}
              {activeChecks.map(renderRow)}

              {/* Bestanden group — collapsed by default */}
              {passChecks.length > 0 && (
                <React.Fragment>
                  <tr
                    className="border-b border-neutral-100 bg-neutral-50 cursor-pointer hover:bg-neutral-100 transition-colors select-none"
                    onClick={() => setPassExpanded(x => !x)}
                  >
                    <td colSpan={4} className="px-3 py-1.5">
                      <div className="flex items-center gap-2">
                        <span className={`icon text-[16px] text-neutral-400 transition-transform duration-150 ${passExpanded ? 'rotate-180' : ''}`} style={{ lineHeight:1 }}>expand_more</span>
                        <span className="text-[12px] font-medium text-neutral-500">Bestanden</span>
                        <span className="inline-flex items-center justify-center w-4 h-4 rounded-full bg-qa-pass text-white text-[10px] font-medium leading-none">{passChecks.length}</span>
                      </div>
                    </td>
                  </tr>
                  {passExpanded && passChecks.map(renderRow)}
                </React.Fragment>
              )}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  /* ── Request Supporting Document Modal ── */
  function RequestDocModal({ check, doc, onConfirm, onClose }) {
    const [creating, setCreating] = React.useState(false);
    function handleConfirm() {
      setCreating(true);

            <p className="text-[11px] text-neutral-400 leading-snug">

              Abbrechen
            </button>
          </div>
        </div>
      </div>,
      document.body
    );
  }

  /* ── Ignore Check Modal ── */
  function IgnoreCheckModal({ check, onConfirm, onClose }) {
    const [note, setNote] = React.useState('');
    const [dirty, setDirty] = React.useState(false);
    const isEmpty = note.trim() === '';
    function handleConfirm() {
      setDirty(true);
      if (!isEmpty) onConfirm(check, note.trim());
    }
    return ReactDOM.createPortal(
      <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[200] p-4" onClick={onClose}>
        <div className="bg-white rounded-lg shadow-xl w-full max-w-[480px] overflow-hidden" onClick={e => e.stopPropagation()}>
          <div className="flex items-center gap-3 px-5 py-4 border-b border-neutral-200">
            <span className="icon icon-filled text-[20px] text-qa-ignored">do_not_disturb_on</span>
            <span className="text-[15px] font-medium text-[#37474f] flex-1">Prüfung ignorieren & Notiz hinzufügen</span>
            <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded hover:bg-neutral-100 text-neutral-500">
              <span className="icon text-[18px]">close</span>
            </button>
          </div>
          <div className="px-5 py-4 flex flex-col gap-4">
            <div className="bg-qa-ignored-light border border-qa-ignored rounded-lg p-3">
              <p className="text-[12px] font-medium text-qa-ignored">{check.name}</p>
              <p className="text-[12px] text-neutral-600 mt-0.5">{check.result}</p>
            </div>
            <div>
              <label className="block text-[12px] font-medium text-[#37474f] mb-1.5">
                Begründung <span className="text-qa-fail">*</span>
              </label>
              <textarea value={note} onChange={e => setNote(e.target.value)} rows={3}
                placeholder="Bitte gib eine Begründung an, warum diese Prüfung ignoriert werden soll …"
                className={`w-full px-3 py-2 text-[13px] border rounded resize-none focus:outline-none transition-colors
                  ${dirty && isEmpty ? 'border-qa-fail bg-qa-fail-light' : 'border-neutral-300 focus:border-primary-500'}`} />
              {dirty && isEmpty && <p className="text-[11px] text-qa-fail mt-1">Bitte gib eine Begründung an.</p>}
            </div>
            <p className="text-[11px] text-neutral-400 leading-snug">
              Diese Prüfung wird beim nächsten Prüfungslauf übersprungen. Die Notiz wird im Prüfungsprotokoll gespeichert.

          <div className="flex items-center justify-end gap-2 px-5 py-3 border-t border-neutral-200 bg-neutral-50">

              Prüfung ignorieren
            </button>
          </div>
        </div>
      </div>,
      document.body
    );
  }

            </span>
            <div className="flex items-center gap-2">
              <span className="text-[12px] leading-[16px]">
                <span className="font-medium text-[#37474f]">5/25</span>
                <span className="text-[#546e7a]"> Dokumente genehmigt</span>
              </span>
              <div className="w-[150px] h-[6px] bg-[#e6f5f3] rounded-full overflow-hidden">
                <div className="h-full w-[20%] bg-[#009688] rounded-full" />
              </div>
            </div>
          </div>
        </div>

        {/* Right: actions + user */}
        <div className="flex items-center gap-2">
          {/* Hochladen primary */}
          <button className="flex items-center gap-1 pl-2 pr-4 py-2 bg-[#009688] hover:bg-primary-600 text-white text-[14px] font-medium rounded transition-colors">
            <span className="icon text-[20px]">upload</span>
            Hochladen
          </button>
          {/* Exportieren secondary */}
          <button className="flex items-center gap-1 pl-2 pr-4 py-2 border border-[#b0bec5] text-[#4b5961] text-[14px] font-medium rounded hover:bg-neutral-50 transition-colors">
            <span className="icon text-[20px]">call_made</span>
            Exportieren
          </button>
          {/* Email icon button with counter */}
          <div className="relative">
            <button className="w-9 h-9 flex items-center justify-center border border-[#b0bec5] rounded text-[#4b5961] hover:bg-neutral-50 transition-colors">
              <span className="icon text-[20px]">email</span>
            </button>
            <div className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-[#009688] rounded-full flex items-center justify-center">
              <span className="text-[10px] font-medium text-white leading-none">4</span>
            </div>
          </div>
          {/* More menu */}
          <button className="w-9 h-9 flex items-center justify-center border border-[#b0bec5] rounded text-[#4b5961] hover:bg-neutral-50 transition-colors">
            <span className="icon text-[20px]">more_horiz</span>
          </button>
          {/* Divider */}
          <div className="w-px h-10 bg-[#eceff1] mx-1" />
          {/* Avatar */}
          <div className="w-8 h-8 rounded-full bg-[#b0bec5] flex items-center justify-center flex-shrink-0">
            <span className="icon text-[20px] text-white">person</span>
          </div>
          {/* User info */}
          <div className="flex items-center gap-1">
            <div className="flex flex-col items-start">
              <span className="text-[14px] text-[#4b5961] leading-[20px] tracking-[0.25px] whitespace-nowrap">Jan Joisten</span>
              <span className="text-[12px] text-[#78909c] leading-[16px] whitespace-nowrap">Berater/in</span>
            </div>
            <span className="icon text-[20px] text-[#4b5961]">expand_more</span>
          </div>
        </div>

      </header>
    );
  }

  /* ── App ── */
  function App() {
    const [selectedId, setSelectedId] = React.useState(201);

    /* QA checks state — keyed by doc id, initialised from QA_CHECKS */
    const [docChecks, setDocChecks] = React.useState(() => {
      const init = {};
      ALL_DOCS.forEach(d => {
        init[d.id] = (QA_CHECKS[d.id] || DEFAULT_QA_CHECKS).map(c => ({ ...c }));
      });
      return init;
    });

    /* Modal state */
    const [requestModal, setRequestModal] = React.useState(null); // { check, doc }
    const [ignoreModal,  setIgnoreModal]  = React.useState(null); // check

    /* Toast */
    const [toast, setToast] = React.useState({ visible: false, message: '' });
    function showToast(msg) {
      setToast({ visible: true, message: msg });
      setTimeout(() => setToast({ visible: false, message: '' }), 3000);
    }

    /* Supporting slots — keyed by parent doc id */
    const [supportingSlots, setSupportingSlots] = React.useState({});

    const selectedDoc    = ALL_DOCS.find(d => d.id === selectedId) ?? null;
    const currentChecks  = selectedDoc ? (docChecks[selectedDoc.id] || []) : [];

    function updateCheck(docId, checkId, updates) {
      setDocChecks(prev => ({
        ...prev,
        [docId]: prev[docId].map(c => c.id === checkId ? { ...c, ...updates } : c),
      }));
    }

    function handleRequestDocConfirm(check) {
      const docId = selectedDoc.id;
      const newSlot = {
        id: `slot-${Date.now()}`,
        name: check.remediation.label,
        docStatus: 'pending',
      };
      setSupportingSlots(prev => ({
        ...prev,
        [docId]: [...(prev[docId] || []), newSlot],
      }));
      updateCheck(docId, check.id, {
        status: 'pending',
        slotCreated: true,
        result: `${check.remediation.label} angefordert`,
      });
      setRequestModal(null);
      showToast('Slot erstellt & Dokument angefordert');
    }

    function handleIgnoreConfirm(check, note) {
      updateCheck(selectedDoc.id, check.id, {
        status: 'ignored',
        override: { note, advisorId: 'jan.joisten', timestamp: new Date().toISOString() },
      });
      setIgnoreModal(null);
      showToast('Prüfung wurde ignoriert');
    }

    function handleResetCheck(checkId) {
      const orig = (QA_CHECKS[selectedDoc?.id] || []).find(c => c.id === checkId);
      if (orig) updateCheck(selectedDoc.id, checkId, { ...orig });
    }

    function handleRerun() {
      showToast('✓ Prüfungen wurden aktualisiert');
    }

    return (
      <div className="h-screen flex flex-col overflow-hidden">
        <Header />
        <div className="flex flex-1 overflow-hidden">
          <Sidebar
            selectedId={selectedId}
            onSelect={setSelectedId}
            supportingSlots={supportingSlots}
          />
          <DocumentViewer
            doc={selectedDoc}
            checks={currentChecks}
            onOpenRequestModal={(check) => setRequestModal({ check, doc: selectedDoc })}
            onOpenIgnoreModal={(check) => setIgnoreModal(check)}
            onChecksUpdate={(checkId, updates) => updateCheck(selectedDoc?.id, checkId, updates)}
            onResetCheck={handleResetCheck}
            onRerun={handleRerun}
          />
          <PageRail doc={selectedDoc} />
        </div>

        {requestModal && (
          <RequestDocModal
            check={requestModal.check}
            doc={requestModal.doc}
            onConfirm={handleRequestDocConfirm}
            onClose={() => setRequestModal(null)}
          />
        )}
        {ignoreModal && (
          <IgnoreCheckModal
            check={ignoreModal}
            onConfirm={handleIgnoreConfirm}
            onClose={() => setIgnoreModal(null)}
          />
        )}
        <Toast message={toast.message} visible={toast.visible} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
